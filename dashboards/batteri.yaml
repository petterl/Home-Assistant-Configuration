title: Batteri
views:
  - title: Batteristatus
    path: batteri
    icon: mdi:battery
    type: custom:grid-layout
    layout:
      grid-template-columns: 1fr 1fr 1fr
      grid-template-rows: auto
      grid-template-areas: |
        "status status status"
        "critical critical critical"
        "zigbee netatmo other"
        "phones phones phones"
    cards:
      # Dynamic status alert banner
      - type: markdown
        view_layout:
          grid-area: status
        content: |
          {% set skip = ['iphone', 'ipad', 'phone', 'watch'] %}
          {% set batteries = states.sensor | selectattr('attributes.device_class', 'defined') | selectattr('attributes.device_class', 'eq', 'battery') | rejectattr('state', 'in', ['unavailable', 'unknown']) | list %}
          {% set ns = namespace(low=[], warning=[]) %}
          {% for b in batteries %}
            {% set id = b.entity_id | lower %}
            {% if skip | select('in', id) | list | length == 0 %}
              {% set lvl = b.state | int(100) %}
              {% set name = b.name | replace(' Battery Level', '') | replace(' Battery', '') | replace(' Batteri', '') %}
              {% if lvl < 30 %}
                {% set ns.low = ns.low + [(name, lvl)] %}
              {% elif lvl < 50 %}
                {% set ns.warning = ns.warning + [(name, lvl)] %}
              {% endif %}
            {% endif %}
          {% endfor %}
          {% if ns.low | length > 0 %}
          <ha-alert alert-type="error">**Byt batteri:** {% for n, l in ns.low %}{{ n }} ({{ l }}%){{ ', ' if not loop.last }}{% endfor %}</ha-alert>
          {% endif %}
          {% if ns.warning | length > 0 %}
          <ha-alert alert-type="warning">**Bevaka:** {% for n, l in ns.warning %}{{ n }} ({{ l }}%){{ ', ' if not loop.last }}{% endfor %}</ha-alert>
          {% endif %}
          {% if ns.low | length == 0 and ns.warning | length == 0 %}
          <ha-alert alert-type="success">Alla enheter OK</ha-alert>
          {% endif %}
        card_mod:
          style: |
            ha-card {
              background: none;
              box-shadow: none;
              padding: 0;
            }

      # Critical batteries - only shows if any under 50%
      - type: custom:auto-entities
        view_layout:
          grid-area: critical
        show_empty: false
        card:
          type: entities
          title: Låga batterier
          show_header_toggle: false
          card_mod:
            style: |
              ha-card { background: rgba(var(--rgb-red), 0.06); }
              .card-header { color: var(--error-color); }
        filter:
          include:
            - attributes:
                device_class: battery
              state: "< 50"
              options:
                secondary_info: last-changed
          exclude:
            - state: "unavailable"
            - state: "unknown"
            - entity_id: "*iphone*"
            - entity_id: "*ipad*"
            - entity_id: "*phone*"
            - entity_id: "*watch*"
        sort:
          method: state
          numeric: true

      # Zigbee devices
      - type: custom:auto-entities
        view_layout:
          grid-area: zigbee
        card:
          type: entities
          title: Zigbee
          show_header_toggle: false
          card_mod:
            style: |
              .card-header { padding-bottom: 0; }
        filter:
          include:
            - entity_id: "sensor.ida_tryckknapp_battery"
              options:
                type: custom:mushroom-entity-card
                name: Ida tryckknapp
                icon: mdi:gesture-tap-button
                layout: horizontal
                card_mod:
                  style: |
                    ha-card { box-shadow: none; }
                    mushroom-state-info { flex-grow: 1; }
            - entity_id: "sensor.moa_tryckknapp_battery"
              options:
                type: custom:mushroom-entity-card
                name: Moa tryckknapp
                icon: mdi:gesture-tap-button
                layout: horizontal
                card_mod:
                  style: |
                    ha-card { box-shadow: none; }
                    mushroom-state-info { flex-grow: 1; }
            - entity_id: "sensor.gastrum_tryckknapp_battery"
              options:
                type: custom:mushroom-entity-card
                name: Gästrum tryckknapp
                icon: mdi:gesture-tap-button
                layout: horizontal
                card_mod:
                  style: |
                    ha-card { box-shadow: none; }
                    mushroom-state-info { flex-grow: 1; }
            - entity_id: "sensor.ida_rullgardin_battery"
              options:
                type: custom:mushroom-entity-card
                name: Idas rullgardin
                icon: mdi:blinds
                layout: horizontal
                card_mod:
                  style: |
                    ha-card { box-shadow: none; }
                    mushroom-state-info { flex-grow: 1; }
            - entity_id: "sensor.moas_rullgardin_battery"
              options:
                type: custom:mushroom-entity-card
                name: Moas rullgardin
                icon: mdi:blinds
                layout: horizontal
                card_mod:
                  style: |
                    ha-card { box-shadow: none; }
                    mushroom-state-info { flex-grow: 1; }
            - entity_id: "sensor.gastrum_hoger_gardin_battery"
              options:
                type: custom:mushroom-entity-card
                name: Gästrum höger
                icon: mdi:blinds
                layout: horizontal
                card_mod:
                  style: |
                    ha-card { box-shadow: none; }
                    mushroom-state-info { flex-grow: 1; }
            - entity_id: "sensor.gastrum_vanster_gardin_battery"
              options:
                type: custom:mushroom-entity-card
                name: Gästrum vänster
                icon: mdi:blinds
                layout: horizontal
                card_mod:
                  style: |
                    ha-card { box-shadow: none; }
                    mushroom-state-info { flex-grow: 1; }
            - entity_id: "sensor.vattensensor_frys_battery"
              options:
                type: custom:mushroom-entity-card
                name: Vattensensor frys
                icon: mdi:water-alert
                layout: horizontal
                card_mod:
                  style: |
                    ha-card { box-shadow: none; }
                    mushroom-state-info { flex-grow: 1; }
            - entity_id: "sensor.vattensensor_fjarrvarme_battery"
              options:
                type: custom:mushroom-entity-card
                name: Vattensensor fjärrvärme
                icon: mdi:water-alert
                layout: horizontal
                card_mod:
                  style: |
                    ha-card { box-shadow: none; }
                    mushroom-state-info { flex-grow: 1; }
        sort:
          method: state
          numeric: true

      # Netatmo devices
      - type: custom:auto-entities
        view_layout:
          grid-area: netatmo
        card:
          type: entities
          title: Netatmo
          show_header_toggle: false
          card_mod:
            style: |
              .card-header { padding-bottom: 0; }
        filter:
          include:
            - entity_id: "sensor.vardagsrum_outdoor_batteri"
              options:
                type: custom:mushroom-entity-card
                name: Utomhusmodul
                icon: mdi:thermometer
                layout: horizontal
                card_mod:
                  style: |
                    ha-card { box-shadow: none; }
                    mushroom-state-info { flex-grow: 1; }
            - entity_id: "sensor.vardagsrum_gastrum_smart_indoor_module_batteri"
              options:
                type: custom:mushroom-entity-card
                name: Gästrum modul
                icon: mdi:thermometer
                layout: horizontal
                card_mod:
                  style: |
                    ha-card { box-shadow: none; }
                    mushroom-state-info { flex-grow: 1; }
            - entity_id: "sensor.vardagsrum_regnmatare_batteri"
              options:
                type: custom:mushroom-entity-card
                name: Regnmätare
                icon: mdi:weather-rainy
                layout: horizontal
                card_mod:
                  style: |
                    ha-card { box-shadow: none; }
                    mushroom-state-info { flex-grow: 1; }
            - entity_id: "sensor.vardagsrum_vindmatare_batteri"
              options:
                type: custom:mushroom-entity-card
                name: Vindmätare
                icon: mdi:weather-windy
                layout: horizontal
                card_mod:
                  style: |
                    ha-card { box-shadow: none; }
                    mushroom-state-info { flex-grow: 1; }
        sort:
          method: state
          numeric: true

      # Other devices (locks, speakers, grill)
      - type: custom:auto-entities
        view_layout:
          grid-area: other
        card:
          type: entities
          title: Enheter
          show_header_toggle: false
          card_mod:
            style: |
              .card-header { padding-bottom: 0; }
        filter:
          include:
            - entity_id: "sensor.garagedorr_batteri"
              options:
                type: custom:mushroom-entity-card
                name: Garagedörr lås
                icon: mdi:lock
                icon_color: |-
                  {% set lvl = states('sensor.garagedorr_batteri') | int(100) %}
                  {% if lvl < 30 %}red{% elif lvl < 50 %}orange{% else %}green{% endif %}
                layout: horizontal
                card_mod:
                  style: |
                    ha-card { box-shadow: none; }
                    mushroom-state-info { flex-grow: 1; }
            - entity_id: "sensor.sonos_move_battery"
              options:
                type: custom:mushroom-entity-card
                name: Sonos Move
                icon: mdi:speaker-wireless
                layout: horizontal
                card_mod:
                  style: |
                    ha-card { box-shadow: none; }
                    mushroom-state-info { flex-grow: 1; }
            - entity_id: "sensor.bluetooth_proxy_igrill_batteri"
              options:
                type: custom:mushroom-entity-card
                name: iGrill
                icon: mdi:grill
                layout: horizontal
                card_mod:
                  style: |
                    ha-card { box-shadow: none; }
                    mushroom-state-info { flex-grow: 1; }
        sort:
          method: state
          numeric: true

      # Phone batteries - horizontal chips
      - type: custom:mushroom-chips-card
        view_layout:
          grid-area: phones
        alignment: center
        chips:
          - type: template
            entity: sensor.petter_iphone_battery_level
            icon: mdi:cellphone
            icon_color: |-
              {% set lvl = states('sensor.petter_iphone_battery_level') | int(100) %}
              {% if lvl < 20 %}red{% elif lvl < 50 %}orange{% else %}green{% endif %}
            content: "Petter"
            content_info: "{{ states('sensor.petter_iphone_battery_level') }}%"
          - type: template
            entity: sensor.petter_iphone_watch_battery_level
            icon: mdi:watch
            icon_color: |-
              {% set lvl = states('sensor.petter_iphone_watch_battery_level') | int(100) %}
              {% if lvl < 20 %}red{% elif lvl < 50 %}orange{% else %}green{% endif %}
            content: "Watch"
            content_info: "{{ states('sensor.petter_iphone_watch_battery_level') }}%"
          - type: template
            entity: sensor.nora_iphone_battery
            icon: mdi:cellphone
            icon_color: |-
              {% set lvl = states('sensor.nora_iphone_battery') | int(100) %}
              {% if lvl < 20 %}red{% elif lvl < 50 %}orange{% else %}green{% endif %}
            content: "Nora"
            content_info: "{{ states('sensor.nora_iphone_battery') }}%"
          - type: template
            entity: sensor.ida_phone_battery
            icon: mdi:cellphone
            icon_color: |-
              {% set lvl = states('sensor.ida_phone_battery') | int(100) %}
              {% if lvl < 20 %}red{% elif lvl < 50 %}orange{% else %}green{% endif %}
            content: "Ida"
            content_info: "{{ states('sensor.ida_phone_battery') }}%"
          - type: template
            entity: sensor.moa_iphone_battery
            icon: mdi:cellphone
            icon_color: |-
              {% set lvl = states('sensor.moa_iphone_battery') | int(100) %}
              {% if lvl < 20 %}red{% elif lvl < 50 %}orange{% else %}green{% endif %}
            content: "Moa"
            content_info: "{{ states('sensor.moa_iphone_battery') }}%"

  - title: Batterihistorik
    path: batterihistorik
    icon: mdi:chart-line
    type: custom:grid-layout
    layout:
      grid-template-columns: 1fr 1fr
      grid-template-rows: auto
      grid-template-areas: |
        "zigbee netatmo"
    cards:
      - type: custom:apexcharts-card
        cache: true
        view_layout:
          grid-area: zigbee
        header:
          show: true
          title: Zigbee-batterier (30 dagar)
        graph_span: 30d
        apex_config:
          chart:
            height: 400
          legend:
            position: top
          stroke:
            width: 2
          yaxis:
            min: 0
            max: 100
            tickAmount: 5
        series:
          - entity: sensor.ida_tryckknapp_battery
            name: Ida knapp
            type: line
            group_by:
              func: last
              duration: 1d
          - entity: sensor.moa_tryckknapp_battery
            name: Moa knapp
            type: line
            group_by:
              func: last
              duration: 1d
          - entity: sensor.ida_rullgardin_battery
            name: Ida gardin
            type: line
            group_by:
              func: last
              duration: 1d
          - entity: sensor.moas_rullgardin_battery
            name: Moa gardin
            type: line
            group_by:
              func: last
              duration: 1d
          - entity: sensor.gastrum_hoger_gardin_battery
            name: Gästrum höger
            type: line
            group_by:
              func: last
              duration: 1d
          - entity: sensor.gastrum_vanster_gardin_battery
            name: Gästrum vänster
            type: line
            group_by:
              func: last
              duration: 1d
          - entity: sensor.gastrum_tryckknapp_battery
            name: Gästrum knapp
            type: line
            group_by:
              func: last
              duration: 1d

      - type: custom:apexcharts-card
        cache: true
        view_layout:
          grid-area: netatmo
        header:
          show: true
          title: Netatmo-batterier (30 dagar)
        graph_span: 30d
        apex_config:
          chart:
            height: 400
          legend:
            position: top
          stroke:
            width: 2
          yaxis:
            min: 0
            max: 100
            tickAmount: 5
        series:
          - entity: sensor.vardagsrum_outdoor_batteri
            name: Utomhus
            type: line
            group_by:
              func: last
              duration: 1d
          - entity: sensor.vardagsrum_gastrum_smart_indoor_module_batteri
            name: Gästrum
            type: line
            group_by:
              func: last
              duration: 1d
          - entity: sensor.vardagsrum_regnmatare_batteri
            name: Regnmätare
            type: line
            color: "#4caf50"
            group_by:
              func: last
              duration: 1d
          - entity: sensor.vardagsrum_vindmatare_batteri
            name: Vindmätare
            type: line
            color: "#9c27b0"
            group_by:
              func: last
              duration: 1d
