title: Batteri
views:
  - title: Batteristatus
    path: batteri
    icon: mdi:battery
    type: custom:grid-layout
    layout:
      grid-template-columns: 1fr 1fr 1fr
      grid-template-rows: auto
      grid-template-areas: |
        "status status status"
        "critical critical critical"
        "zigbee netatmo other"
        "phones phones phones"
    cards:
      # Dynamic status alert banner
      - type: markdown
        view_layout:
          grid-area: status
        content: |
          {% set skip = ['iphone', 'ipad', 'phone', 'watch'] %}
          {% set batteries = states.sensor | selectattr('attributes.device_class', 'defined') | selectattr('attributes.device_class', 'eq', 'battery') | rejectattr('state', 'in', ['unavailable', 'unknown']) | list %}
          {% set ns = namespace(low=[], warning=[]) %}
          {% for b in batteries %}
            {% set id = b.entity_id | lower %}
            {% if skip | select('in', id) | list | length == 0 %}
              {% set lvl = b.state | int(100) %}
              {% set name = b.name | replace(' Battery Level', '') | replace(' Battery', '') | replace(' Batteri', '') %}
              {% if lvl < 30 %}
                {% set ns.low = ns.low + [(name, lvl)] %}
              {% elif lvl < 50 %}
                {% set ns.warning = ns.warning + [(name, lvl)] %}
              {% endif %}
            {% endif %}
          {% endfor %}
          {% if ns.low | length > 0 %}
          <ha-alert alert-type="error">**Byt batteri:** {% for n, l in ns.low %}{{ n }} ({{ l }}%){{ ', ' if not loop.last }}{% endfor %}</ha-alert>
          {% endif %}
          {% if ns.warning | length > 0 %}
          <ha-alert alert-type="warning">**Bevaka:** {% for n, l in ns.warning %}{{ n }} ({{ l }}%){{ ', ' if not loop.last }}{% endfor %}</ha-alert>
          {% endif %}
          {% if ns.low | length == 0 and ns.warning | length == 0 %}
          <ha-alert alert-type="success">Alla enheter OK</ha-alert>
          {% endif %}
        card_mod:
          style: |
            ha-card {
              background: none;
              box-shadow: none;
              padding: 0;
            }

      # Critical batteries - shows devices flagged low by battery_notes
      # (per-device threshold) plus untracked devices < 30%
      - type: custom:auto-entities
        view_layout:
          grid-area: critical
        show_empty: false
        card:
          type: entities
          title: Låga batterier
          show_header_toggle: false
          card_mod:
            style: |
              ha-card { background: rgba(var(--rgb-red), 0.06); }
              .card-header { color: var(--error-color); }
        filter:
          template: |
            {%- set tracked = [
              ['Ida tryckknapp', 'sensor.ida_tryckknapp_battery', 'ida_tryckknapp', 'mdi:gesture-tap-button'],
              ['Moa tryckknapp', 'sensor.moa_tryckknapp_battery', 'moa_tryckknapp', 'mdi:gesture-tap-button'],
              ['Gästrum tryckknapp', 'sensor.gastrum_tryckknapp_battery', 'gastrum_tryckknapp', 'mdi:gesture-tap-button'],
              ['Idas rullgardin', 'sensor.ida_rullgardin_battery', 'idas_rullgardin', 'mdi:blinds'],
              ['Moas rullgardin', 'sensor.moas_rullgardin_battery', 'moa_rullgardin', 'mdi:blinds'],
              ['Gästrum höger', 'sensor.gastrum_hoger_gardin_battery', 'gastrum_hoger_gardin', 'mdi:blinds'],
              ['Gästrum vänster', 'sensor.gastrum_vanster_gardin_battery', 'gastrum_vanster_gardin', 'mdi:blinds'],
              ['Vattensensor frys', 'sensor.vattensensor_frys_battery', 'vattensensor_frys', 'mdi:water-alert'],
              ['Vattensensor fjärrvärme', 'sensor.vattensensor_fjarrvarme_battery', 'vattensensor_fjarrvarme', 'mdi:water-alert'],
              ['Sonos Move', 'sensor.sonos_move_battery', 'sonos_move', 'mdi:speaker-wireless'],
              ['Utomhusmodul', 'sensor.vardagsrum_outdoor_batteri', 'vardagsrum_outdoor', 'mdi:thermometer'],
              ['Gästrum modul', 'sensor.vardagsrum_gastrum_smart_indoor_module_batteri', 'vardagsrum_gastrum_smart_indoor_module', 'mdi:thermometer']
            ] %}
            {%- set untracked = [
              ['Garagedörr lås', 'sensor.garagedorr_batteri', 'mdi:lock'],
              ['iGrill', 'sensor.bluetooth_proxy_igrill_batteri', 'mdi:grill'],
              ['Regnmätare', 'sensor.vardagsrum_regnmatare_batteri', 'mdi:weather-rainy'],
              ['Vindmätare', 'sensor.vardagsrum_vindmatare_batteri', 'mdi:weather-windy']
            ] %}
            {%- for d in tracked -%}
              {%- if is_state('binary_sensor.' ~ d[2] ~ '_battery_plus_low', 'on') -%}
                {
                  "type": "custom:mushroom-template-card",
                  "entity": "{{ d[1] }}",
                  "primary": "{{ d[0] }}",
                  "secondary": "{{ states('sensor.' ~ d[2] ~ '_battery_type') }} · {{ states(d[1]) }}%",
                  "icon": "{{ d[3] }}",
                  "icon_color": "red",
                  "layout": "horizontal"
                },
              {%- endif -%}
            {%- endfor -%}
            {%- for d in untracked -%}
              {%- if states(d[1]) | int(100) < 30 -%}
                {
                  "type": "custom:mushroom-template-card",
                  "entity": "{{ d[1] }}",
                  "primary": "{{ d[0] }}",
                  "secondary": "{{ states(d[1]) }}%",
                  "icon": "{{ d[2] }}",
                  "icon_color": "red",
                  "layout": "horizontal"
                },
              {%- endif -%}
            {%- endfor -%}

      # Zigbee devices
      - type: custom:auto-entities
        view_layout:
          grid-area: zigbee
        card:
          type: entities
          title: Zigbee
          show_header_toggle: false
          card_mod:
