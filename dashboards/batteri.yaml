  - title: Batterihistorik
    path: batterihistorik
    icon: mdi:chart-line
    type: custom:grid-layout
    layout:
      grid-template-columns: 1fr 1fr
      grid-template-rows: auto
      grid-template-areas: |
        "zigbee netatmo"
    cards:
      - type: custom:apexcharts-card
        cache: true
        view_layout:
          grid-area: zigbee
        header:
          show: true
          title: Zigbee-batterier (30 dagar)
        graph_span: 30d
        apex_config:
          chart:
            height: 400
          legend:
            position: top
          stroke:
            width: 2
          yaxis:
            min: 0
            max: 100
            tickAmount: 5
        series:
          - entity: sensor.ida_tryckknapp_battery
            name: Ida knapp
            type: line
            group_by:
              func: last
              duration: 1d
          - entity: sensor.moa_tryckknapp_battery
            name: Moa knapp
            type: line
            group_by:
              func: last
              duration: 1d
          - entity: sensor.ida_rullgardin_battery
            name: Ida gardin
            type: line
            group_by:
              func: last
              duration: 1d
          - entity: sensor.moas_rullgardin_battery
            name: Moa gardin
            type: line
            group_by:
              func: last
              duration: 1d
          - entity: sensor.gastrum_hoger_gardin_battery
            name: Gästrum höger
            type: line
            group_by:
              func: last
              duration: 1d
          - entity: sensor.gastrum_vanster_gardin_battery
            name: Gästrum vänster
            type: line
            group_by:
              func: last
              duration: 1d
          - entity: sensor.gastrum_tryckknapp_battery
            name: Gästrum knapp
            type: line
            group_by:
              func: last
              duration: 1d

      - type: custom:apexcharts-card
        cache: true
        view_layout:
          grid-area: netatmo
        header:
          show: true
          title: Netatmo-batterier (30 dagar)
        graph_span: 30d
        apex_config:
          chart:
            height: 400
          legend:
            position: top
          stroke:
            width: 2
          yaxis:
            min: 0
            max: 100
            tickAmount: 5
        series:
          - entity: sensor.vardagsrum_outdoor_batteri
            name: Utomhus
            type: line
            group_by:
              func: last
              duration: 1d
          - entity: sensor.vardagsrum_gastrum_smart_indoor_module_batteri
            name: Gästrum
            type: line
            group_by:
              func: last
              duration: 1d
          - entity: sensor.vardagsrum_regnmatare_batteri
            name: Regnmätare
            type: line
            color: "#4caf50"
            group_by:
              func: last
              duration: 1d
          - entity: sensor.vardagsrum_vindmatare_batteri
            name: Vindmätare
            type: line
            color: "#9c27b0"
            group_by:
              func: last
              duration: 1d
