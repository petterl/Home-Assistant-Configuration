title: Batteri
views:
  - title: Batteristatus
    path: batteri
    icon: mdi:battery
    type: custom:grid-layout
    layout:
      grid-template-columns: 1fr 1fr 1fr
      grid-template-rows: auto
      grid-template-areas: |
        "status status status"
        "batteries batteries batteries"
    cards:
      # Dynamic status alert banner
      - type: markdown
        view_layout:
          grid-area: status
        content: |
          {% set batteries = states.sensor | selectattr('attributes.device_class', 'eq', 'battery') | rejectattr('state', 'in', ['unavailable', 'unknown']) | list %}
          {% set ns = namespace(low=[], warning=[], ok=[]) %}
          {% for b in batteries %}
            {% set lvl = b.state | int(100) %}
            {% if lvl < 30 %}
              {% set ns.low = ns.low + [b] %}
            {% elif lvl < 50 %}
              {% set ns.warning = ns.warning + [b] %}
            {% else %}
              {% set ns.ok = ns.ok + [b] %}
            {% endif %}
          {% endfor %}
          {% if ns.low | length > 0 %}
          <ha-alert alert-type="error">**Byt batteri:** {{ ns.low | map(attribute='name') | join(', ') }} ({{ ns.low | map(attribute='state') | join('%, ') }}%)</ha-alert>
          {% endif %}
          {% if ns.warning | length > 0 %}
          <ha-alert alert-type="warning">**Bevaka:** {{ ns.warning | map(attribute='name') | join(', ') }} ({{ ns.warning | map(attribute='state') | join('%, ') }}%)</ha-alert>
          {% endif %}
          {% if ns.low | length == 0 and ns.warning | length == 0 %}
          <ha-alert alert-type="success">Alla {{ ns.ok | length }} batterier OK (över 50%)</ha-alert>
          {% endif %}
        card_mod:
          style: |
            ha-card {
              background: none;
              box-shadow: none;
              padding: 0;
            }

      # Auto-discovered battery list sorted by level
      - type: custom:auto-entities
        view_layout:
          grid-area: batteries
        card:
          type: entities
          title: Alla batterier
          show_header_toggle: false
        filter:
          include:
            - attributes:
                device_class: battery
              options:
                secondary_info: last-changed
          exclude:
            - state: "unavailable"
            - state: "unknown"
        sort:
          method: state
          numeric: true

  - title: Batterihistorik
    path: batterihistorik
    icon: mdi:chart-line
    type: custom:grid-layout
    layout:
      grid-template-columns: 1fr 1fr
      grid-template-rows: auto
      grid-template-areas: |
        "zigbee netatmo"
    cards:
      - type: custom:apexcharts-card
        cache: true
        view_layout:
          grid-area: zigbee
        header:
          show: true
          title: Zigbee-batterier (30 dagar)
        graph_span: 30d
        apex_config:
          chart:
            height: 400
          legend:
            position: top
          stroke:
            width: 2
          yaxis:
            min: 0
            max: 100
            tickAmount: 5
        series:
          - entity: sensor.ida_tryckknapp_battery
            name: Ida knapp
            type: line
            group_by:
              func: last
              duration: 1d
          - entity: sensor.moa_tryckknapp_battery
            name: Moa knapp
            type: line
            group_by:
              func: last
              duration: 1d
          - entity: sensor.ida_rullgardin_battery
            name: Ida gardin
            type: line
            group_by:
              func: last
              duration: 1d
          - entity: sensor.moas_rullgardin_battery
            name: Moa gardin
            type: line
            group_by:
              func: last
              duration: 1d
          - entity: sensor.gastrum_hoger_gardin_battery
            name: Gästrum höger
            type: line
            group_by:
              func: last
              duration: 1d
          - entity: sensor.gastrum_vanster_gardin_battery
            name: Gästrum vänster
            type: line
            group_by:
              func: last
              duration: 1d
          - entity: sensor.gastrum_tryckknapp_battery
            name: Gästrum knapp
            type: line
            group_by:
              func: last
              duration: 1d

      - type: custom:apexcharts-card
        cache: true
        view_layout:
          grid-area: netatmo
        header:
          show: true
          title: Netatmo-batterier (30 dagar)
        graph_span: 30d
        apex_config:
          chart:
            height: 300
          legend:
            position: top
          stroke:
            width: 2
          yaxis:
            min: 0
            max: 100
        series:
          - entity: sensor.vardagsrum_outdoor_batteri
            name: Utomhus
            type: line
            group_by:
              func: last
              duration: 1d
          - entity: sensor.vardagsrum_gastrum_smart_indoor_module_batteri
            name: Gästrum
            type: line
            group_by:
              func: last
              duration: 1d
          - entity: sensor.vardagsrum_regnmatare_batteri
            name: Regnmätare
            type: line
            color: "#4caf50"
            group_by:
              func: last
              duration: 1d
          - entity: sensor.vardagsrum_vindmatare_batteri
            name: Vindmätare
            type: line
            color: "#9c27b0"
            group_by:
              func: last
              duration: 1d
