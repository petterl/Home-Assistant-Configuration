title: Batteri
views:
  - title: Batteristatus
    path: batteri
    icon: mdi:battery
    type: custom:grid-layout
    layout:
      grid-template-columns: 1fr 1fr 1fr
      grid-template-rows: auto
      grid-template-areas: |
        "status status status"
        "zigbee netatmo other"
    cards:
      # Status overview
      - type: markdown
        view_layout:
          grid-area: status
        content: |
          {% set batteries = {
            'Ida tryckknapp': states('sensor.ida_tryckknapp_battery') | int(100),
            'Moa tryckknapp': states('sensor.moa_tryckknapp_battery') | int(100),
            'Gästrum tryckknapp': states('sensor.gastrum_tryckknapp_battery') | int(100),
            'Ida rullgardin': states('sensor.ida_rullgardin_battery') | int(100),
            'Moa rullgardin': states('sensor.moas_rullgardin_battery') | int(100),
            'Gästrum höger': states('sensor.gastrum_hoger_gardin_battery') | int(100),
            'Gästrum vänster': states('sensor.gastrum_vanster_gardin_battery') | int(100),
            'Netatmo outdoor': states('sensor.vardagsrum_outdoor_batteri') | int(100),
            'Netatmo gästrum': states('sensor.vardagsrum_gastrum_smart_indoor_module_batteri') | int(100),
            'Netatmo regn': states('sensor.vardagsrum_regnmatare_batteri') | int(100),
            'Netatmo vind': states('sensor.vardagsrum_vindmatare_batteri') | int(100),
            'iGrill': states('sensor.bluetooth_proxy_igrill_batteri') | int(100),
            'Sonos Move': states('sensor.sonos_move_battery') | int(100)
          } %}
          {% set low = batteries | dictsort | selectattr('1', 'lt', 30) | list %}
          {% set warning = batteries | dictsort | selectattr('1', 'lt', 50) | selectattr('1', 'ge', 30) | list %}
          {% set ok = batteries | dictsort | selectattr('1', 'ge', 50) | list %}
          {% if low | length > 0 %}
          <ha-alert alert-type="error">**Byt batteri:** {{ low | map(attribute='0') | join(', ') }} ({{ low | map(attribute='1') | join('%, ') }}%)</ha-alert>
          {% endif %}
          {% if warning | length > 0 %}
          <ha-alert alert-type="warning">**Bevaka:** {{ warning | map(attribute='0') | join(', ') }} ({{ warning | map(attribute='1') | join('%, ') }}%)</ha-alert>
          {% endif %}
          {% if low | length == 0 and warning | length == 0 %}
          <ha-alert alert-type="success">Alla {{ ok | length }} batterier OK (över 50%)</ha-alert>
          {% endif %}
        card_mod:
          style: |
            ha-card {
              background: none;
              box-shadow: none;
              padding: 0;
            }

      # Zigbee devices
      - type: entities
        view_layout:
          grid-area: zigbee
        title: Zigbee-enheter
        show_header_toggle: false
        entities:
          - type: section
            label: Tryckknappar
          - entity: sensor.ida_tryckknapp_battery
            name: Ida tryckknapp
            icon: mdi:gesture-tap-button
          - entity: sensor.moa_tryckknapp_battery
            name: Moa tryckknapp
            icon: mdi:gesture-tap-button
          - entity: sensor.gastrum_tryckknapp_battery
            name: Gästrum tryckknapp
            icon: mdi:gesture-tap-button
          - type: section
            label: Rullgardiner
          - entity: sensor.ida_rullgardin_battery
            name: Idas rullgardin
            icon: mdi:blinds
          - entity: sensor.moas_rullgardin_battery
            name: Moas rullgardin
            icon: mdi:blinds
          - entity: sensor.gastrum_hoger_gardin_battery
            name: Gästrum höger
            icon: mdi:blinds
          - entity: sensor.gastrum_vanster_gardin_battery
            name: Gästrum vänster
            icon: mdi:blinds

      # Netatmo devices
      - type: entities
        view_layout:
          grid-area: netatmo
        title: Netatmo
        show_header_toggle: false
        entities:
          - entity: sensor.vardagsrum_outdoor_batteri
            name: Utomhusmodul
            icon: mdi:thermometer
          - entity: sensor.vardagsrum_gastrum_smart_indoor_module_batteri
            name: Gästrum modul
            icon: mdi:thermometer
          - entity: sensor.vardagsrum_regnmatare_batteri
            name: Regnmätare
            icon: mdi:weather-rainy
          - entity: sensor.vardagsrum_vindmatare_batteri
            name: Vindmätare
            icon: mdi:weather-windy

      # Other devices
      - type: entities
        view_layout:
          grid-area: other
        title: Övrigt
        show_header_toggle: false
        entities:
          - entity: sensor.sonos_move_battery
            name: Sonos Move
            icon: mdi:speaker-wireless
          - entity: sensor.bluetooth_proxy_igrill_batteri
            name: iGrill
            icon: mdi:grill
          - type: section
            label: Telefoner
          - entity: sensor.petter_iphone_battery_level
            name: Petter iPhone
            icon: mdi:cellphone
          - entity: sensor.petter_iphone_watch_battery_level
            name: Petter Watch
            icon: mdi:watch
          - entity: sensor.nora_iphone_battery
            name: Nora iPhone
            icon: mdi:cellphone
          - entity: sensor.ida_phone_battery
            name: Ida iPhone
            icon: mdi:cellphone
          - entity: sensor.moa_iphone_battery
            name: Moa iPhone
            icon: mdi:cellphone

  - title: Batterihistorik
    path: batterihistorik
    icon: mdi:chart-line
    type: custom:grid-layout
    layout:
      grid-template-columns: 1fr 1fr
      grid-template-rows: auto
      grid-template-areas: |
        "zigbee netatmo"
    cards:
      - type: custom:apexcharts-card
        cache: true
        view_layout:
          grid-area: zigbee
        header:
          show: true
          title: Zigbee-batterier (30 dagar)
        graph_span: 30d
        apex_config:
          chart:
            height: 400
          legend:
            position: top
          stroke:
            width: 2
          yaxis:
            min: 0
            max: 100
            tickAmount: 5
        series:
          - entity: sensor.ida_tryckknapp_battery
            name: Ida knapp
            type: line
            group_by:
              func: last
              duration: 1d
          - entity: sensor.moa_tryckknapp_battery
            name: Moa knapp
            type: line
            group_by:
              func: last
              duration: 1d
          - entity: sensor.ida_rullgardin_battery
            name: Ida gardin
            type: line
            group_by:
              func: last
              duration: 1d
          - entity: sensor.moas_rullgardin_battery
            name: Moa gardin
            type: line
            group_by:
              func: last
              duration: 1d
          - entity: sensor.gastrum_hoger_gardin_battery
            name: Gästrum höger
            type: line
            group_by:
              func: last
              duration: 1d
          - entity: sensor.gastrum_vanster_gardin_battery
            name: Gästrum vänster
            type: line
            group_by:
              func: last
              duration: 1d
          - entity: sensor.gastrum_tryckknapp_battery
            name: Gästrum knapp
            type: line
            group_by:
              func: last
              duration: 1d

      - type: custom:apexcharts-card
        cache: true
        view_layout:
          grid-area: netatmo
        header:
          show: true
          title: Netatmo-batterier (30 dagar)
        graph_span: 30d
        apex_config:
          chart:
            height: 300
          legend:
            position: top
          stroke:
            width: 2
          yaxis:
            min: 0
            max: 100
        series:
          - entity: sensor.vardagsrum_outdoor_batteri
            name: Utomhus
            type: line
            group_by:
              func: last
              duration: 1d
          - entity: sensor.vardagsrum_gastrum_smart_indoor_module_batteri
            name: Gästrum
            type: line
            group_by:
              func: last
              duration: 1d
