title: Elektricitet

decluttering_templates:
  metric_card:
    default:
      - action: more-info
      - nav_path: ""
    card:
      type: custom:mushroom-entity-card
      entity: "[[entity]]"
      name: "[[name]]"
      icon: "[[icon]]"
      icon_color: "[[color]]"
      layout: vertical
      tap_action:
        action: "[[action]]"
        navigation_path: "[[nav_path]]"
      card_mod:
        style: |
          ha-card {
            background: rgba(var(--rgb-[[color]]), 0.1);
          }

views:
  - title: Översikt
    path: oversikt
    icon: mdi:flash
    type: custom:grid-layout
    layout:
      grid-template-columns: 1fr 1fr
      grid-template-rows: auto
      grid-template-areas: |
        "smart smart"
        "status flow"
        "metrics metrics"
        "price price"
    cards:
      # Smart Tid Hero Card - When to run appliances
      - type: markdown
        view_layout:
          grid-area: smart
        content: |
          {% set status = states('sensor.elkostnad_status') %}
          {% set smart_tid = states('sensor.smart_tid_data') %}
          {% set is_today = state_attr('sensor.smart_tid_data', 'is_today') %}
          {% set recommendation = state_attr('sensor.elkostnad_status', 'recommendation') %}

          {% if status == 'Perfekt' %}
          <ha-alert alert-type="success">
            <strong>PERFEKT LÄGE</strong> — Kör disk/tvätt nu!
            <br><small>Lågt pris + solproduktion</small>
          </ha-alert>
          {% elif status == 'Bra' %}
          <ha-alert alert-type="success">
            <strong>BRA LÄGE</strong> — {{ recommendation }}
            <br><small>Bästa 3-timmarsperiod: <strong>{{ smart_tid }}</strong></small>
          </ha-alert>
          {% elif status == 'OK' %}
          <ha-alert alert-type="info">
            <strong>NORMALT LÄGE</strong>
            <br><small>Bästa tid: <strong>{{ smart_tid }}</strong></small>
          </ha-alert>
          {% else %}
          <ha-alert alert-type="warning">
            <strong>VÄNTA</strong> — {{ recommendation }}
            <br><small>Bästa tid: <strong>{{ smart_tid }}</strong></small>
          </ha-alert>
          {% endif %}
        card_mod:
          style: |
            ha-card {
              background: none;
              box-shadow: none;
              padding: 0;
            }

      # Current Status Card
      - type: entities
        view_layout:
          grid-area: status
        title: Nuläge
        entities:
          - entity: sensor.nordpool_kwh_se3_sek_3_10_025
            name: Spotpris (Nordpool)
            icon: mdi:lightning-bolt
          - entity: sensor.elpris_skelleftea_kraft
            name: Totalpris (inkl påslag)
            icon: mdi:currency-usd
          - entity: sensor.solarnet_effekt_solceller
            name: Solproduktion
            icon: mdi:solar-power
          - entity: sensor.smart_meter_ts_65a_3_aktiv_effekt
            name: Förbrukning
            icon: mdi:flash
          - entity: sensor.peak_power_top_5_average
            name: Effekttopp (snitt)
            icon: mdi:chart-line

      # Power Flow Card
      - type: custom:power-flow-card-plus
        view_layout:
          grid-area: flow
        entities:
          grid:
            entity: sensor.smart_meter_ts_65a_3_aktiv_effekt
            name: Elnät
          solar:
            entity: sensor.solarnet_effekt_solceller
            name: Sol
            display_zero_state: true
          home:
            entity: sensor.solarnet_forbrukad_effekt
            name: Hem
        watt_threshold: 0
        kw_decimals: 2
        w_decimals: 0
        min_expected_power: 0.01
        max_expected_power: 10000
        display_zero_lines:
          mode: show
        use_new_flow_rate_model: true

      # Key metrics row
      - type: horizontal-stack
        view_layout:
          grid-area: metrics
        cards:
          - type: custom:decluttering-card
            template: metric_card
            variables:
              - entity: sensor.elpris_lagsta_idag
              - name: Lägsta idag
              - icon: mdi:arrow-down
              - color: green
          - type: custom:decluttering-card
            template: metric_card
            variables:
              - entity: sensor.elpris_hogsta_idag
              - name: Högsta idag
              - icon: mdi:arrow-up
              - color: red
          - type: custom:decluttering-card
            template: metric_card
            variables:
              - entity: sensor.solcast_pv_forecast_forecast_remaining_today
              - name: Sol kvar
              - icon: mdi:sun-clock
              - color: yellow
              - action: navigate
              - nav_path: /lovelace-elektricitet/energi
          - type: custom:decluttering-card
            template: metric_card
            variables:
              - entity: sensor.effektavgift_manad
              - name: Effektavgift
              - icon: mdi:cash
              - color: blue
              - action: navigate
              - nav_path: /lovelace-elektricitet/effekttariff

      # Smart Tid Chart - Best time to run appliances
      # Shows electricity price with solar forecast overlay
      - type: custom:apexcharts-card
        view_layout:
          grid-area: price
        header:
          show: true
          title: "Elpris & Solprognos - Idag"
          show_states: false
        graph_span: 24h
        span:
          start: day
        now:
          show: true
          label: Nu
        yaxis:
          - id: price
            min: 0
            decimals: 2
            apex_config:
              title:
                text: "kr/kWh"
          - id: solar
            opposite: true
            min: 0
            decimals: 1
            apex_config:
              title:
                text: "kW"
        apex_config:
          chart:
            height: 280
          legend:
            show: true
            position: top
          stroke:
            width: [0, 0, 2, 2]
        series:
          # Best 3-hour window highlight (green background)
          - entity: sensor.smart_tid_data
            name: Bästa tid
            type: area
            yaxis_id: price
            color: "#4caf50"
            opacity: 0.15
            stroke_width: 0
            show:
              legend_value: false
              in_header: false
            data_generator: |
              var slot = entity.attributes.best_start_slot || '-1';
              var parts = slot.split(':');
              var bestSlot = parts.length === 2 ? parseInt(parts[0]) * 4 + Math.floor(parseInt(parts[1]) / 15) : -1;
              var isToday = entity.state.toLowerCase().includes('idag');
              var s = new Date(); s.setHours(0,0,0,0);
              var base = s.getTime();
              var r = [];
              for (var i=0; i<96; i++) {
                var inWindow = isToday && i >= bestSlot && i < bestSlot + 12;
                r.push([base + i*900000, inWindow ? 5 : null]);
              }
              return r;
          # Electricity price as bars (quarter-hourly)
          - entity: sensor.nordpool_kwh_se3_sek_3_10_025
            name: Spotpris
            type: column
            yaxis_id: price
            color: "#2196f3"
            opacity: 0.7
            show:
              legend_value: false
            data_generator: |
              var t = entity.attributes.today || [];
              var s = new Date(); s.setHours(0,0,0,0);
              var base = s.getTime();
              var r = [];
              for (var i=0; i<t.length; i++) {
                r.push([base + i*900000, t[i] || 0]);
              }
              return r;
          # Solar forecast as area
          - entity: sensor.solcast_pv_forecast_forecast_today
            name: Solprognos
            type: area
            yaxis_id: solar
            color: "#ff9800"
            opacity: 0.2
            show:
              legend_value: false
            data_generator: |
              var forecast = entity.attributes.detailedForecast || [];
              var s = new Date(); s.setHours(0,0,0,0);
              var base = s.getTime();
              var hourly = {};
              forecast.forEach(function(f) {
                var d = new Date(f.period_start);
                var h = d.getHours();
                if (!hourly[h]) hourly[h] = 0;
                hourly[h] += (f.pv_estimate || 0) / 2;
              });
              var r = [];
              for (var i=0; i<24; i++) {
                r.push([base + i*3600000, hourly[i] || 0]);
              }
              return r;
          # Peak power warning line (90% of top 5 average)
          - entity: sensor.peak_power_top_5_average
            name: Effektvarning
            type: line
            yaxis_id: solar
            color: "#f44336"
            opacity: 0.8
            show:
              legend_value: false
            data_generator: |
              var peak = parseFloat(entity.state) * 0.9 || 1;
              var s = new Date(); s.setHours(0,0,0,0);
              var base = s.getTime();
              return [[base, peak], [base + 23*3600000, peak]];

  - title: Energi
    path: energi
    icon: mdi:lightning-bolt
    type: custom:grid-layout
    layout:
      grid-template-columns: 1fr 1fr 1fr
      grid-template-rows: auto
      grid-template-areas: |
        "metrics metrics metrics"
        "gauge chart chart"
        "info chart chart"
        "solar phases phases"
    cards:
      # Key metrics - full width
      - type: horizontal-stack
        view_layout:
          grid-area: metrics
        cards:
          - type: custom:decluttering-card
            template: metric_card
            variables:
              - entity: sensor.solarnet_effekt_solceller
              - name: Produktion
              - icon: mdi:solar-power
              - color: orange
          - type: custom:decluttering-card
            template: metric_card
            variables:
              - entity: sensor.solarnet_relativ_autonomi
              - name: Autonomi
              - icon: mdi:home-battery
              - color: green
          - type: custom:decluttering-card
            template: metric_card
            variables:
              - entity: sensor.solarnet_relativ_sjalvkonsumtion
              - name: Självkonsumtion
              - icon: mdi:home-circle
              - color: teal

      # Left - Gauge
      - type: gauge
        view_layout:
          grid-area: gauge
        entity: sensor.solarnet_relativ_autonomi
        name: Självförsörjning
        unit: "%"
        min: 0
        max: 100
        needle: true
        segments:
          - from: 0
            color: "#f44336"
          - from: 25
            color: "#ff9800"
          - from: 50
            color: "#8bc34a"
          - from: 75
            color: "#4caf50"
        card_mod:
          style: |
            ha-card {
              --ha-card-border-radius: 16px;
            }

      # Left - Grid energy info
      - type: entities
        view_layout:
          grid-area: info
        title: Nätenergi
        show_header_toggle: false
        entities:
          - entity: sensor.smart_meter_ts_65a_3_verklig_energi_forbrukad
            name: Importerat från nät
            icon: mdi:transmission-tower-import
          - entity: sensor.smart_meter_ts_65a_3_verklig_energi_producerad
            name: Exporterat till nät
            icon: mdi:transmission-tower-export
          - entity: sensor.solarnet_total_energi
            name: Total solenergi
            icon: mdi:solar-power

      # Right - Energy flow chart (spans 2 columns, 2 rows)
      - type: custom:apexcharts-card
        cache: true
        view_layout:
          grid-area: chart
        header:
          show: true
          title: Energiflöde (24h)
        graph_span: 24h
        apex_config:
          chart:
            height: 350
          legend:
            position: top
          stroke:
            width: 2
        series:
          - entity: sensor.solarnet_effekt_solceller
            name: Solproduktion
            type: area
            color: "#ff9800"
            opacity: 0.5
            group_by:
              func: avg
              duration: 15m
          - entity: sensor.solarnet_forbrukad_effekt
            name: Förbrukning
            type: line
            color: "#2196f3"
            group_by:
              func: avg
              duration: 15m
          - entity: sensor.solarnet_elnat_import
            name: Import
            type: area
            color: "#f44336"
            opacity: 0.3
            group_by:
              func: avg
              duration: 15m
          - entity: sensor.solarnet_elnat_export
            name: Export
            type: area
            color: "#4caf50"
            opacity: 0.3
            group_by:
              func: avg
              duration: 15m

      # Bottom left - Solar system
      - type: entities
        view_layout:
          grid-area: solar
        title: Solceller
        show_header_toggle: false
        entities:
          - entity: sensor.solarnet_effekt_solceller
            name: Aktuell produktion
            icon: mdi:solar-power
          - entity: sensor.fornvagen_19_linkoping_total_energi
            name: Total produktion
            icon: mdi:counter
          - entity: sensor.fornvagen_19_linkoping_inverterlage
            name: Inverter status
            icon: mdi:information-outline

      # Bottom right - Phase info (spans 2 columns)
      - type: entities
        view_layout:
          grid-area: phases
        title: Fasinformation
        show_header_toggle: false
        entities:
          - entity: sensor.smart_meter_ts_65a_3_aktiv_effekt_fas_1
            name: Fas 1
          - entity: sensor.smart_meter_ts_65a_3_aktiv_effekt_fas_2
            name: Fas 2
          - entity: sensor.smart_meter_ts_65a_3_aktiv_effekt_fas_3
            name: Fas 3

  - title: Effekttariff
    path: effekttariff
    icon: mdi:chart-timeline-variant
    type: custom:grid-layout
    layout:
      grid-template-columns: 1fr 1fr 1fr
      grid-template-rows: auto
      grid-template-areas: |
        "status status status"
        "metrics metrics metrics"
        "peaks chart chart"
        "tips chart chart"
    cards:
      # Status - full width
      - type: markdown
        view_layout:
          grid-area: status
        content: |
          {% set month = now().month %}
          {% if month >= 4 and month <= 10 %}
          <ha-alert alert-type="success">
          <strong>Sommartariff aktiv</strong> — 22 kr/kW (April–Oktober)
          </ha-alert>
          {% else %}
          <ha-alert alert-type="warning">
          <strong>Vintertariff aktiv</strong> — 43 kr/kW (November–Mars)
          </ha-alert>
          {% endif %}
        card_mod:
          style: |
            ha-card {
              background: none;
              box-shadow: none;
              padding: 0;
            }

      # Key metrics - full width
      - type: horizontal-stack
        view_layout:
          grid-area: metrics
        cards:
          - type: custom:decluttering-card
            template: metric_card
            variables:
              - entity: sensor.peak_power_top_5_average
              - name: Topp 5 medel
              - icon: mdi:chart-bell-curve
              - color: blue
          - type: custom:decluttering-card
            template: metric_card
            variables:
              - entity: sensor.effektavgift_manad
              - name: Månadsavgift
              - icon: mdi:cash
              - color: amber
              - action: navigate
              - nav_path: /lovelace-elektricitet/kostnader

      # Left - Top 5 peaks
      - type: entities
        view_layout:
          grid-area: peaks
        title: Topp 5 Effekttoppar
        entities:
          - entity: sensor.effekttopp_1
            name: "1. Högsta"
          - entity: sensor.effekttopp_2
            name: "2."
          - entity: sensor.effekttopp_3
            name: "3."
          - entity: sensor.effekttopp_4
            name: "4."
          - entity: sensor.effekttopp_5
            name: "5."

      # Left - Tips
      - type: markdown
        view_layout:
          grid-area: tips
        title: Tips
        content: |
          **Så håller du nere effektavgiften:**

          &#128161; Undvik flera stora förbrukare samtidigt

          &#128161; Fördela tvätt, disk och laddning över tid

          &#128161; Var extra försiktig vintertid (dubbel tariff!)

      # Right - Monthly chart (spans 2 columns, 2 rows)
      - type: custom:apexcharts-card
        cache: true
        view_layout:
          grid-area: chart
        header:
          show: true
          title: Effekt denna månad
          show_states: true
        graph_span: 31d
        span:
          start: month
        apex_config:
          chart:
            height: 350
          stroke:
            width: 2
        series:
          - entity: sensor.smart_meter_ts_65a_3_aktiv_effekt
            name: Timmedel
            type: line
            color: "#2196f3"
            group_by:
              func: avg
              duration: 1h

  - title: Förbrukare
    path: forbrukare
    icon: mdi:devices
    type: custom:grid-layout
    layout:
      grid-template-columns: 1fr 1fr 1fr
      grid-template-rows: auto
      grid-template-areas: |
        "metrics metrics metrics"
        "energy chart chart"
        "energy chart chart"
    cards:
      # Device power cards - full width
      - type: horizontal-stack
        view_layout:
          grid-area: metrics
        cards:
          - type: custom:decluttering-card
            template: metric_card
            variables:
              - entity: sensor.ftx_power
              - name: FTX
              - icon: mdi:fan
              - color: blue
          - type: custom:decluttering-card
            template: metric_card
            variables:
              - entity: sensor.casa_power
              - name: CASA
              - icon: mdi:air-filter
              - color: cyan
          - type: custom:decluttering-card
            template: metric_card
            variables:
              - entity: sensor.frys_power
              - name: Frys
              - icon: mdi:fridge
              - color: light-blue
          - type: custom:decluttering-card
            template: metric_card
            variables:
              - entity: sensor.torktumlare_effekt
              - name: Torktumlare
              - icon: mdi:tumble-dryer
              - color: orange
          - type: custom:decluttering-card
            template: metric_card
            variables:
              - entity: sensor.network_power
              - name: Nätverk
              - icon: mdi:network
              - color: purple
          - type: custom:decluttering-card
            template: metric_card
            variables:
              - entity: sensor.okand_effekt
              - name: Okänd
              - icon: mdi:help-circle
              - color: grey

      # Left - Energy totals
      - type: entities
        view_layout:
          grid-area: energy
        title: Energi (24h)
        show_header_toggle: false
        entities:
          - entity: sensor.ftx_energi_24h
            name: FTX (Ventilation)
            icon: mdi:fan
          - entity: sensor.casa_energi_24h
            name: CASA
            icon: mdi:air-filter
          - entity: sensor.frys_energi_24h
            name: Frys
            icon: mdi:fridge
          - entity: sensor.torktumlare_energi_24h
            name: Torktumlare
            icon: mdi:tumble-dryer
          - entity: sensor.network_energi_24h
            name: Nätverk
            icon: mdi:network
          - entity: sensor.okand_energi_24h
            name: Okänd
            icon: mdi:help-circle

      # Right - Device chart (spans 2 columns)
      - type: custom:apexcharts-card
        cache: true
        view_layout:
          grid-area: chart
        header:
          show: true
          title: Förbrukare (24h)
        graph_span: 24h
        apex_config:
          chart:
            height: 350
          legend:
            position: top
          stroke:
            width: 2
        series:
          - entity: sensor.ftx_power
            name: FTX
            type: area
            color: "#2196f3"
            opacity: 0.5
            group_by:
              func: avg
