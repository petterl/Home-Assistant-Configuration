          - entity: sensor.casa_power
            name: CASA
            type: area
            color: "#00bcd4"
            opacity: 0.5
            group_by:
              func: avg
              duration: 15m
          - entity: sensor.frys_power
            name: Frys
            type: area
            color: "#03a9f4"
            opacity: 0.5
            group_by:
              func: avg
              duration: 15m
          - entity: sensor.torktumlare_effekt
            name: Torktumlare
            type: area
            color: "#ff9800"
            opacity: 0.5
            group_by:
              func: avg
              duration: 15m
          - entity: sensor.network_power
            name: Nätverk
            type: area
            color: "#9c27b0"
            opacity: 0.5
            group_by:
              func: avg
              duration: 15m
          - entity: sensor.okand_effekt
            name: Okänd
            type: area
            color: "#9e9e9e"
            opacity: 0.5
            group_by:
              func: avg
              duration: 15m

  - title: Statistik
    path: statistik
    icon: mdi:chart-line
    type: custom:grid-layout
    layout:
      grid-template-columns: 1fr 1fr
      grid-template-rows: auto
      grid-template-areas: |
        "power price"
        "energy energy"
    cards:
      # Left - 7 day power
      - type: custom:apexcharts-card
        cache: true
        view_layout:
          grid-area: power
        header:
          show: true
          title: Effekt (7 dagar)
        graph_span: 7d
        apex_config:
          chart:
            height: 300
          stroke:
            width: 2
        series:
          - entity: sensor.smart_meter_ts_65a_3_aktiv_effekt
            name: Effekt
            type: line
            color: "#2196f3"
            group_by:
              func: avg
              duration: 1h

      # Right - 7 day price
      - type: custom:apexcharts-card
        cache: true
        view_layout:
          grid-area: price
        header:
          show: true
          title: Elpris (7 dagar)
        graph_span: 7d
        apex_config:
          chart:
            height: 300
          stroke:
            width: 2
        series:
          - entity: sensor.nordpool_kwh_se3_sek_3_10_025
            name: Spotpris
            type: area
            color: "#4caf50"
            opacity: 0.3

      # Bottom - 7 day energy (full width)
      - type: history-graph
        view_layout:
          grid-area: energy
        title: Energi (7 dagar)
        hours_to_show: 168
        entities:
          - entity: sensor.smart_meter_ts_65a_3_verklig_energi_forbrukad
            name: Import
          - entity: sensor.smart_meter_ts_65a_3_verklig_energi_producerad
            name: Export

  - title: Kostnader
    path: kostnader
    icon: mdi:currency-usd
    type: custom:grid-layout
    layout:
      grid-template-columns: 1fr 1fr 1fr
      grid-template-rows: auto
      grid-template-areas: |
        "metrics metrics metrics"
        "pricechart pricechart pricechart"
        "stats costs chart"
    cards:
      # Nordpool Price Chart - Full width
      - type: custom:apexcharts-card
        cache: true
        view_layout:
          grid-area: pricechart
        header:
          show: true
          title: "Nordpool Spotpris (48h)"
          show_states: false
        graph_span: 48h
        span:
          start: day
        now:
          show: true
          label: Nu
        yaxis:
          - min: 0
            apex_config:
              labels:
                formatter: |
                  EVAL:function(val) { return val.toFixed(2) + ' kr'; }
        apex_config:
          chart:
            height: 250
          legend:
            show: true
            position: top
          tooltip:
            y:
              formatter: |
                EVAL:function(val) { return val ? val.toFixed(3) + ' kr/kWh' : '-'; }
        series:
          - entity: sensor.nordpool_kwh_se3_sek_3_10_025
            name: Lågt pris (<0.8 kr)
            type: column
            color: "#4caf50"
            show:
              legend_value: false
            data_generator: |
              var t = entity.attributes.today || [];
              var m = entity.attributes.tomorrow || [];
              var s = new Date(); s.setHours(0,0,0,0);
              var base = s.getTime();
              var r = [];
              for (var i=0; i<t.length; i++) { var p=t[i]; r.push([base + i*900000, p < 0.8 ? p : null]); }
              for (var i=0; i<m.length; i++) { var p=m[i]; r.push([base + 86400000 + i*900000, p != null && p < 0.8 ? p : null]); }
              return r;
          - entity: sensor.nordpool_kwh_se3_sek_3_10_025
            name: Normalt (0.8-1.5 kr)
            type: column
            color: "#8bc34a"
            show:
              legend_value: false
            data_generator: |
              var t = entity.attributes.today || [];
              var m = entity.attributes.tomorrow || [];
              var s = new Date(); s.setHours(0,0,0,0);
              var base = s.getTime();
              var r = [];
              for (var i=0; i<t.length; i++) { var p=t[i]; r.push([base + i*900000, (p >= 0.8 && p < 1.5) ? p : null]); }
              for (var i=0; i<m.length; i++) { var p=m[i]; r.push([base + 86400000 + i*900000, p != null && (p >= 0.8 && p < 1.5) ? p : null]); }
              return r;
