title: System
views:
  - title: System
    path: system
    icon: mdi:cog
    type: custom:grid-layout
    layout:
      grid-template-columns: 1fr 1fr
      grid-template-rows: auto
      grid-template-areas: |
        "actions actions"
        "git automations"
        "watchman watchman"
        "health health"
        "info info"
    cards:
      # Actions - full width
      - type: horizontal-stack
        view_layout:
          grid-area: actions
        cards:
          - type: button
            entity: input_button.git_push
            name: Git Push
            icon: mdi:cloud-upload
            tap_action:
              action: toggle
            show_state: false
          - type: button
            entity: input_button.generate_claude_snapshot
            name: Claude Snapshot
            icon: mdi:robot
            tap_action:
              action: toggle
            show_state: false

      # Git Status - left column
      - type: vertical-stack
        view_layout:
          grid-area: git
        cards:
          - type: markdown
            title: Git Status
            content: |
              **Commit:** `{{ state_attr('sensor.git_status', 'hash') }}`
              **Meddelande:** {{ state_attr('sensor.git_status', 'message') }}
              **Ålder:** {{ state_attr('sensor.git_status', 'age') }}
          - type: entities
            title: Git Automationer
            show_header_toggle: false
            entities:
              - entity: automation.git_pull_vid_github_push
                name: Pull vid GitHub push
                secondary_info: last-triggered
              - entity: automation.git_pull_vid_uppstart
                name: Pull vid uppstart
                secondary_info: last-triggered
              - entity: automation.git_schemalagd_pull
                name: Schemalagd pull (var 6:e timme)
                secondary_info: last-triggered
              - entity: automation.git_push_lokala_andringar
                name: Push lokala ändringar
                secondary_info: last-triggered

      # Automations - right column
      - type: entities
        view_layout:
          grid-area: automations
        title: Övriga Automationer
        show_header_toggle: false
        entities:
          - entity: automation.effekt_varning_vid_ny_topp
            name: Effekt - Varning vid ny topp
            secondary_info: last-triggered
          - entity: automation.claude_generate_snapshot
            name: Claude - Generate Snapshot
            secondary_info: last-triggered

      # Watchman - full width
      - type: entities
        view_layout:
          grid-area: watchman
        title: Watchman
        show_header_toggle: false
        entities:
          - entity: sensor.watchman_missing_entities
            name: Saknade entiteter
            icon: mdi:alert-circle-outline
          - entity: sensor.watchman_missing_actions
            name: Saknade actions
            icon: mdi:alert-outline
          - entity: sensor.watchman_last_updated
            name: Senast uppdaterad
            icon: mdi:clock-outline
          - type: button
            name: Kör rapport
            icon: mdi:file-search-outline
            tap_action:
              action: call-service
              service: watchman.report
              data:
                parse_config: true

      # System Health - full width
      - type: vertical-stack
        view_layout:
          grid-area: health
        cards:
          - type: horizontal-stack
            cards:
              - type: gauge
                entity: sensor.system_monitor_memory_use_percent
                name: HA Minne
                min: 0
                max: 100
                severity:
                  green: 0
                  yellow: 60
                  red: 80
              - type: gauge
                entity: sensor.atlas_volume_1_volymanvandning
                name: NAS Vol 1
                min: 0
                max: 100
                severity:
                  green: 0
                  yellow: 70
                  red: 85
              - type: gauge
                entity: sensor.atlas_volume_2_volymanvandning
                name: NAS Vol 2
                min: 0
                max: 100
                severity:
                  green: 0
                  yellow: 70
                  red: 85
          - type: entities
            title: NAS Status
            show_header_toggle: false
            entities:
              - entity: sensor.atlas_volume_1_status
                name: Volume 1 Status
                icon: mdi:harddisk
              - entity: sensor.atlas_volume_2_status
                name: Volume 2 Status
                icon: mdi:harddisk
              - entity: sensor.atlas_temperatur
                name: NAS Temperatur
                icon: mdi:thermometer

      # Info - full width
      - type: markdown
        view_layout:
          grid-area: info
        title: Information
        content: |
          **Git Push:** Sparar och pushar lokala ändringar till GitHub.
          Kräver `github_pat` och `github_repo` i secrets.yaml.

          **Claude Snapshot:** Genererar en snapshot för Claude Desktop.

          Statusmeddelanden visas som notifieringar.
