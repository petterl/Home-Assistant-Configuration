# =============================================================================
# TEMPLATE SENSORS - ELECTRICITY PRICING AND DEMAND TARIFF
# =============================================================================
# Pricing (Skellefteå Kraft):
#   - Spot price SE3 + 0.06 SEK/kWh markup + 0.006 SEK/kWh electricity certificate
#   - Monthly fee: 39.20 SEK
# Demand tariff (grid):
#   - Summer (Apr-Oct): 22 SEK/kW
#   - Winter (Nov-Mar): 43 SEK/kW
#   - Based on average of 5 highest hourly peak demands per month
# =============================================================================

- sensor:
    - name: "Elpris Skellefteå Kraft"
      unique_id: elpris_skelleftea_kraft
      unit_of_measurement: "SEK/kWh"
      device_class: monetary
      state: >
        {% set spot = states('sensor.nordpool_kwh_se3_sek_3_10_025') | float(0) %}
        {% set markup = 0.066 %}
        {{ (spot + markup) | round(4) }}
      attributes:
        spot_price: "{{ states('sensor.nordpool_kwh_se3_sek_3_10_025') }}"
        markup: "0.06 SEK/kWh"
        electricity_certificate: "0.006 SEK/kWh"
        monthly_fee: "39.20 SEK/month"

    - name: "Ersättning Solproduktion"
      unique_id: ersattning_solproduktion
      unit_of_measurement: "SEK/kWh"
      device_class: monetary
      state: >
        {% set spot = states('sensor.nordpool_kwh_se3_sek_3_10_025') | float(0) %}
        {% set bonus = 0.02 %}
        {{ (spot + bonus) | round(4) }}
      attributes:
        spot_price: "{{ states('sensor.nordpool_kwh_se3_sek_3_10_025') }}"
        production_bonus: "0.02 SEK/kWh"

    - name: "Effektavgift Månad"
      unique_id: effektavgift_manad
      unit_of_measurement: "SEK"
      device_class: monetary
      state: >
        {% set peak_kw = states('sensor.peak_power_top_5_average') | float(0) %}
        {% set month = now().month %}
        {% if month >= 4 and month <= 10 %}
          {% set rate = 22 %}
        {% else %}
          {% set rate = 43 %}
        {% endif %}
        {{ (peak_kw * rate) | round(2) }}
      attributes:
        peak_power_kw: "{{ states('sensor.peak_power_top_5_average') }}"
        season: "{{ 'summer' if now().month >= 4 and now().month <= 10 else 'winter' }}"
        rate_kr_per_kw: "{{ 22 if now().month >= 4 and now().month <= 10 else 43 }}"
        summer_rate: "22 kr/kW"
        winter_rate: "43 kr/kW"
        calculation_method: "Average of top 5 hourly peaks"

    # Dashboard display sensors - uses 96 quarter-hourly prices from today array
    - name: "Elpris Lägsta Idag"
      unique_id: elpris_lagsta_idag
      unit_of_measurement: "kr"
      icon: mdi:arrow-down
      state: >
        {% set today = state_attr('sensor.nordpool_kwh_se3_sek_3_10_025', 'today') | default([]) %}
        {{ today | min | round(2) if today else 0 }}
      attributes:
        tidpunkt: >
          {% set today = state_attr('sensor.nordpool_kwh_se3_sek_3_10_025', 'today') | default([]) %}
          {% if today %}
            {% set idx = today.index(today | min) %}
            {% set minutes = idx * 15 %}
            {{ '%02d:%02d' | format(minutes // 60, minutes % 60) }}
          {% endif %}

    - name: "Elpris Högsta Idag"
      unique_id: elpris_hogsta_idag
      unit_of_measurement: "kr"
      icon: mdi:arrow-up
      state: >
        {% set today = state_attr('sensor.nordpool_kwh_se3_sek_3_10_025', 'today') | default([]) %}
        {{ today | max | round(2) if today else 0 }}
      attributes:
        tidpunkt: >
          {% set today = state_attr('sensor.nordpool_kwh_se3_sek_3_10_025', 'today') | default([]) %}
          {% if today %}
            {% set idx = today.index(today | max) %}
            {% set minutes = idx * 15 %}
            {{ '%02d:%02d' | format(minutes // 60, minutes % 60) }}
          {% endif %}

    - name: "Elpris Medel Idag"
      unique_id: elpris_medel_idag
      unit_of_measurement: "kr"
      icon: mdi:arrow-left-right
      state: >
        {% set today = state_attr('sensor.nordpool_kwh_se3_sek_3_10_025', 'today') | default([]) %}
        {{ (today | sum / today | length) | round(2) if today else 0 }}

    # =========================================================================
    # PEAK POWER SENSORS (from power_max_tracker integration)
    # These provide backwards-compatible entity IDs
    # =========================================================================
    - name: "Peak Power Top 5 Average"
      unique_id: peak_power_top_5_average
      unit_of_measurement: "kW"
      device_class: power
      state: >
        {{ states('sensor.average_max_hourly_average_power') | float(0) }}

    - name: "Peak Power 5th Highest"
      unique_id: peak_power_5th_highest
      unit_of_measurement: "kW"
      device_class: power
      state: >
        {{ states('sensor.max_hourly_average_power_5') | float(0) }}

    # Peak power display sensors (value + datetime from power_max_tracker)
    - name: "Effekttopp 1"
      unique_id: effekttopp_1
      icon: mdi:flash
      state: >
        {% set t = states('sensor.max_hourly_average_power_last_update_1') %}
        {% set v = states('sensor.max_hourly_average_power_1') | float(0) %}
        {% if t not in ['unknown', 'unavailable'] and v > 0 %}
        {{ as_timestamp(t) | timestamp_custom('%d/%m %H:00') }} — {{ v | round(2) }} kW
        {% else %}-{% endif %}

    - name: "Effekttopp 2"
      unique_id: effekttopp_2
      icon: mdi:flash
      state: >
        {% set t = states('sensor.max_hourly_average_power_last_update_2') %}
        {% set v = states('sensor.max_hourly_average_power_2') | float(0) %}
        {% if t not in ['unknown', 'unavailable'] and v > 0 %}
        {{ as_timestamp(t) | timestamp_custom('%d/%m %H:00') }} — {{ v | round(2) }} kW
        {% else %}-{% endif %}

    - name: "Effekttopp 3"
      unique_id: effekttopp_3
      icon: mdi:flash
      state: >
        {% set t = states('sensor.max_hourly_average_power_last_update_3') %}
        {% set v = states('sensor.max_hourly_average_power_3') | float(0) %}
        {% if t not in ['unknown', 'unavailable'] and v > 0 %}
        {{ as_timestamp(t) | timestamp_custom('%d/%m %H:00') }} — {{ v | round(2) }} kW
        {% else %}-{% endif %}

    - name: "Effekttopp 4"
      unique_id: effekttopp_4
      icon: mdi:flash
      state: >
        {% set t = states('sensor.max_hourly_average_power_last_update_4') %}
        {% set v = states('sensor.max_hourly_average_power_4') | float(0) %}
        {% if t not in ['unknown', 'unavailable'] and v > 0 %}
        {{ as_timestamp(t) | timestamp_custom('%d/%m %H:00') }} — {{ v | round(2) }} kW
        {% else %}-{% endif %}

    - name: "Effekttopp 5"
      unique_id: effekttopp_5
      icon: mdi:flash
      state: >
        {% set t = states('sensor.max_hourly_average_power_last_update_5') %}
        {% set v = states('sensor.max_hourly_average_power_5') | float(0) %}
        {% if t not in ['unknown', 'unavailable'] and v > 0 %}
        {{ as_timestamp(t) | timestamp_custom('%d/%m %H:00') }} — {{ v | round(2) }} kW
        {% else %}-{% endif %}

    # Unknown energy consumption (total - tracked devices)
    - name: "Okänd Energi 24h"
      unique_id: okand_energi_24h
      icon: mdi:help-circle
      unit_of_measurement: "kWh"
      state_class: measurement
      state: >
        {% set total = states('sensor.total_energi_24h_wh') | float(0) / 1000 %}
        {% set ftx = states('sensor.ftx_energi_24h') | float(0) %}
        {% set casa = states('sensor.casa_energi_24h') | float(0) %}
        {% set frys = states('sensor.frys_energi_24h') | float(0) %}
        {% set tork = states('sensor.torktumlare_energi_24h') | float(0) %}
        {% set network = states('sensor.network_energi_24h') | float(0) %}
        {% set unknown = total - ftx - casa - frys - tork - network %}
        {{ unknown | round(1) }}

    # Unknown power (for chart)
    - name: "Okänd Effekt"
      unique_id: okand_effekt
      icon: mdi:help-circle
      unit_of_measurement: "W"
      state_class: measurement
      state: >
        {% set total = states('sensor.smart_meter_ts_65a_3_aktiv_effekt') | float(0) %}
        {% set ftx = states('sensor.ftx_power') | float(0) %}
        {% set casa = states('sensor.casa_power') | float(0) %}
        {% set frys = states('sensor.frys_power') | float(0) %}
        {% set tork = states('sensor.torktumlare_effekt') | float(0) %}
        {% set network = states('sensor.network_power') | float(0) %}
        {% set unknown = total - ftx - casa - frys - tork - network %}
        {{ [unknown, 0] | max | round(0) }}

