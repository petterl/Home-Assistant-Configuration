# =============================================================================
# TRIGGER-BASED TEMPLATE SENSORS
# =============================================================================
# These sensors update on specific triggers and compute once, storing results
# in attributes. More efficient than recalculating on every state read.
#
# OPTIMIZATION: Sorted prices computed once and stored as JSON, then parsed
# by simple template sensors for each hour slot.
# =============================================================================

- trigger:
    - platform: homeassistant
      event: start
    - platform: state
      entity_id: sensor.nordpool_kwh_se3_sek_3_10_025
    - platform: time_pattern
      hours: "*"  # Update every hour to refresh "remaining today" hours
  sensor:
    - name: "Billigaste Timpriser Data"
      unique_id: billigaste_timpriser_data
      icon: mdi:lightning-bolt
      state: >
        {% set today = state_attr('sensor.nordpool_kwh_se3_sek_3_10_025', 'today') or [] %}
        {% set tomorrow = state_attr('sensor.nordpool_kwh_se3_sek_3_10_025', 'tomorrow') or [] %}
        {% set step = 4 if today | length > 24 else 1 %}
        {% set ns = namespace(prices=[]) %}
        {% for i in range(0, today | length, step) %}
          {% set hour = (i / step) | int %}
          {% if hour >= now().hour %}
            {% set ns.prices = ns.prices + [{'price': today[i], 'day': 'Idag', 'hour': hour}] %}
          {% endif %}
        {% endfor %}
        {% for i in range(0, tomorrow | length, step) %}
          {% set hour = (i / step) | int %}
          {% set ns.prices = ns.prices + [{'price': tomorrow[i], 'day': 'Imorgon', 'hour': hour}] %}
        {% endfor %}
        {% set sorted = ns.prices | sort(attribute='price') %}
        {{ sorted | length }} timmar
      attributes:
        # Pre-compute formatted hour strings - no JSON parsing needed by display sensor
        hour_1: >
          {% set today = state_attr('sensor.nordpool_kwh_se3_sek_3_10_025', 'today') or [] %}
          {% set tomorrow = state_attr('sensor.nordpool_kwh_se3_sek_3_10_025', 'tomorrow') or [] %}
          {% set step = 4 if today | length > 24 else 1 %}
          {% set ns = namespace(prices=[]) %}
          {% for i in range(0, today | length, step) %}
            {% set hour = (i / step) | int %}
            {% if hour >= now().hour %}
              {% set ns.prices = ns.prices + [{'price': today[i], 'day': 'Idag', 'hour': hour}] %}
            {% endif %}
          {% endfor %}
          {% for i in range(0, tomorrow | length, step) %}
            {% set hour = (i / step) | int %}
            {% set ns.prices = ns.prices + [{'price': tomorrow[i], 'day': 'Imorgon', 'hour': hour}] %}
          {% endfor %}
          {% set sorted = ns.prices | sort(attribute='price') %}
          {% if sorted | length > 0 %}{% set p = sorted[0] %}{{ p.day }} {{ '%02d:00' | format(p.hour) }} — {{ p.price | round(2) }} kr{% else %}-{% endif %}
        hour_2: >
          {% set today = state_attr('sensor.nordpool_kwh_se3_sek_3_10_025', 'today') or [] %}
          {% set tomorrow = state_attr('sensor.nordpool_kwh_se3_sek_3_10_025', 'tomorrow') or [] %}
          {% set step = 4 if today | length > 24 else 1 %}
          {% set ns = namespace(prices=[]) %}
          {% for i in range(0, today | length, step) %}
            {% set hour = (i / step) | int %}
            {% if hour >= now().hour %}
              {% set ns.prices = ns.prices + [{'price': today[i], 'day': 'Idag', 'hour': hour}] %}
            {% endif %}
          {% endfor %}
          {% for i in range(0, tomorrow | length, step) %}
            {% set hour = (i / step) | int %}
            {% set ns.prices = ns.prices + [{'price': tomorrow[i], 'day': 'Imorgon', 'hour': hour}] %}
          {% endfor %}
          {% set sorted = ns.prices | sort(attribute='price') %}
          {% if sorted | length > 1 %}{% set p = sorted[1] %}{{ p.day }} {{ '%02d:00' | format(p.hour) }} — {{ p.price | round(2) }} kr{% else %}-{% endif %}
        hour_3: >
          {% set today = state_attr('sensor.nordpool_kwh_se3_sek_3_10_025', 'today') or [] %}
          {% set tomorrow = state_attr('sensor.nordpool_kwh_se3_sek_3_10_025', 'tomorrow') or [] %}
          {% set step = 4 if today | length > 24 else 1 %}
          {% set ns = namespace(prices=[]) %}
          {% for i in range(0, today | length, step) %}
            {% set hour = (i / step) | int %}
            {% if hour >= now().hour %}
              {% set ns.prices = ns.prices + [{'price': today[i], 'day': 'Idag', 'hour': hour}] %}
            {% endif %}
          {% endfor %}
          {% for i in range(0, tomorrow | length, step) %}
            {% set hour = (i / step) | int %}
            {% set ns.prices = ns.prices + [{'price': tomorrow[i], 'day': 'Imorgon', 'hour': hour}] %}
          {% endfor %}
          {% set sorted = ns.prices | sort(attribute='price') %}
          {% if sorted | length > 2 %}{% set p = sorted[2] %}{{ p.day }} {{ '%02d:00' | format(p.hour) }} — {{ p.price | round(2) }} kr{% else %}-{% endif %}
        hour_4: >
          {% set today = state_attr('sensor.nordpool_kwh_se3_sek_3_10_025', 'today') or [] %}
          {% set tomorrow = state_attr('sensor.nordpool_kwh_se3_sek_3_10_025', 'tomorrow') or [] %}
          {% set step = 4 if today | length > 24 else 1 %}
          {% set ns = namespace(prices=[]) %}
          {% for i in range(0, today | length, step) %}
            {% set hour = (i / step) | int %}
            {% if hour >= now().hour %}
              {% set ns.prices = ns.prices + [{'price': today[i], 'day': 'Idag', 'hour': hour}] %}
            {% endif %}
          {% endfor %}
          {% for i in range(0, tomorrow | length, step) %}
            {% set hour = (i / step) | int %}
            {% set ns.prices = ns.prices + [{'price': tomorrow[i], 'day': 'Imorgon', 'hour': hour}] %}
          {% endfor %}
          {% set sorted = ns.prices | sort(attribute='price') %}
          {% if sorted | length > 3 %}{% set p = sorted[3] %}{{ p.day }} {{ '%02d:00' | format(p.hour) }} — {{ p.price | round(2) }} kr{% else %}-{% endif %}
        hour_5: >
          {% set today = state_attr('sensor.nordpool_kwh_se3_sek_3_10_025', 'today') or [] %}
          {% set tomorrow = state_attr('sensor.nordpool_kwh_se3_sek_3_10_025', 'tomorrow') or [] %}
          {% set step = 4 if today | length > 24 else 1 %}
          {% set ns = namespace(prices=[]) %}
          {% for i in range(0, today | length, step) %}
            {% set hour = (i / step) | int %}
            {% if hour >= now().hour %}
              {% set ns.prices = ns.prices + [{'price': today[i], 'day': 'Idag', 'hour': hour}] %}
            {% endif %}
          {% endfor %}
          {% for i in range(0, tomorrow | length, step) %}
            {% set hour = (i / step) | int %}
            {% set ns.prices = ns.prices + [{'price': tomorrow[i], 'day': 'Imorgon', 'hour': hour}] %}
          {% endfor %}
          {% set sorted = ns.prices | sort(attribute='price') %}
          {% if sorted | length > 4 %}{% set p = sorted[4] %}{{ p.day }} {{ '%02d:00' | format(p.hour) }} — {{ p.price | round(2) }} kr{% else %}-{% endif %}

# Display sensor that reads pre-computed attributes (no JSON parsing)
- sensor:
    - name: "Billigaste Timpriser"
      unique_id: billigaste_timpriser
      icon: mdi:lightning-bolt
