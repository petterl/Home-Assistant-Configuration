# =============================================================================
# TRIGGER-BASED TEMPLATE SENSORS
# =============================================================================
# These sensors update on specific triggers and compute once, storing results
# in attributes. More efficient than recalculating on every state read.
#
# OPTIMIZATION: Sorted prices computed once and stored as JSON, then parsed
# by simple template sensors for each hour slot.
# =============================================================================

- trigger:
    - platform: homeassistant
      event: start
    - platform: state
      entity_id: sensor.nordpool_kwh_se3_sek_3_10_025
    - platform: time_pattern
      minutes: "/15"  # Update every 15 min to refresh remaining slots
  sensor:
    - name: "Billigaste Kvartspriser Data"
      unique_id: billigaste_kvartspriser_data
      icon: mdi:lightning-bolt
      state: >
        {% set today = state_attr('sensor.nordpool_kwh_se3_sek_3_10_025', 'today') or [] %}
        {% set tomorrow = state_attr('sensor.nordpool_kwh_se3_sek_3_10_025', 'tomorrow') or [] %}
        {% set current_slot = now().hour * 4 + (now().minute // 15) %}
        {% set ns = namespace(prices=[]) %}
        {% for i in range(current_slot, today | length) %}
          {% set ns.prices = ns.prices + [{'price': today[i], 'day': 'Idag', 'slot': i}] %}
        {% endfor %}
        {% for i in range(0, tomorrow | length) %}
          {% set ns.prices = ns.prices + [{'price': tomorrow[i], 'day': 'Imorgon', 'slot': i}] %}
        {% endfor %}
        {% set sorted = ns.prices | sort(attribute='price') %}
        {{ sorted | length }} kvartar
      attributes:
        # Store sorted prices as JSON for display sensor to read
        prices_sorted: >
          {% set today = state_attr('sensor.nordpool_kwh_se3_sek_3_10_025', 'today') or [] %}
          {% set tomorrow = state_attr('sensor.nordpool_kwh_se3_sek_3_10_025', 'tomorrow') or [] %}
          {% set current_slot = now().hour * 4 + (now().minute // 15) %}
          {% set ns = namespace(prices=[]) %}
          {% for i in range(current_slot, today | length) %}
            {% set ns.prices = ns.prices + [{'price': today[i], 'day': 'Idag', 'slot': i}] %}
          {% endfor %}
          {% for i in range(0, tomorrow | length) %}
            {% set ns.prices = ns.prices + [{'price': tomorrow[i], 'day': 'Imorgon', 'slot': i}] %}
          {% endfor %}
          {{ ns.prices | sort(attribute='price') }}

# Display sensor reads pre-computed sorted prices from trigger sensor
- sensor:
    - name: "Billigaste Kvartspriser"
      unique_id: billigaste_kvartspriser
      icon: mdi:lightning-bolt
      state: >
        {% set data = state_attr('sensor.billigaste_kvartspriser_data', 'prices_sorted') or [] %}
        {% if data | length > 0 %}
          {% set p = data[0] %}{{ p.day }} {{ '%02d:%02d' | format((p.slot * 15) // 60, (p.slot * 15) % 60) }} — {{ p.price | round(2) }} kr
        {% else %}-{% endif %}
      attributes:
        slot_1: >
          {% set data = state_attr('sensor.billigaste_kvartspriser_data', 'prices_sorted') or [] %}
          {% if data | length > 0 %}{% set p = data[0] %}{{ p.day }} {{ '%02d:%02d' | format((p.slot * 15) // 60, (p.slot * 15) % 60) }} — {{ p.price | round(2) }} kr{% else %}-{% endif %}
        slot_2: >
          {% set data = state_attr('sensor.billigaste_kvartspriser_data', 'prices_sorted') or [] %}
          {% if data | length > 1 %}{% set p = data[1] %}{{ p.day }} {{ '%02d:%02d' | format((p.slot * 15) // 60, (p.slot * 15) % 60) }} — {{ p.price | round(2) }} kr{% else %}-{% endif %}
        slot_3: >
          {% set data = state_attr('sensor.billigaste_kvartspriser_data', 'prices_sorted') or [] %}
          {% if data | length > 2 %}{% set p = data[2] %}{{ p.day }} {{ '%02d:%02d' | format((p.slot * 15) // 60, (p.slot * 15) % 60) }} — {{ p.price | round(2) }} kr{% else %}-{% endif %}
        slot_4: >
          {% set data = state_attr('sensor.billigaste_kvartspriser_data', 'prices_sorted') or [] %}
          {% if data | length > 3 %}{% set p = data[3] %}{{ p.day }} {{ '%02d:%02d' | format((p.slot * 15) // 60, (p.slot * 15) % 60) }} — {{ p.price | round(2) }} kr{% else %}-{% endif %}
        slot_5: >
          {% set data = state_attr('sensor.billigaste_kvartspriser_data', 'prices_sorted') or [] %}
          {% if data | length > 4 %}{% set p = data[4] %}{{ p.day }} {{ '%02d:%02d' | format((p.slot * 15) // 60, (p.slot * 15) % 60) }} — {{ p.price | round(2) }} kr{% else %}-{% endif %}

# =============================================================================
# SMART APPLIANCE TIMING - Best time to run dishwasher/washing machine
# =============================================================================
# Calculates "net cost" per hour: electricity price minus solar savings
# Finds the best 3-hour window for running appliances
# =============================================================================

- trigger:
    - platform: homeassistant
      event: start
    - platform: state
      entity_id: sensor.nordpool_kwh_se3_sek_3_10_025
    - platform: state
      entity_id: sensor.solcast_pv_forecast_forecast_today
    - platform: time_pattern
      minutes: "/15"  # Update every 15 min for quarter-hour precision
  sensor:
    - name: "Smart Tid Data"
      unique_id: smart_tid_data
      icon: mdi:washing-machine
      state: >
        {% set prices_raw = state_attr('sensor.nordpool_kwh_se3_sek_3_10_025', 'today') or [] %}
        {% set prices_tomorrow = state_attr('sensor.nordpool_kwh_se3_sek_3_10_025', 'tomorrow') or [] %}
        {% set solar = state_attr('sensor.solcast_pv_forecast_forecast_today', 'detailedForecast') or [] %}
        {% set solar_tomorrow = state_attr('sensor.solcast_pv_forecast_forecast_tomorrow', 'detailedForecast') or [] %}
        {% set current_slot = now().hour * 4 + (now().minute // 15) %}
        {% set window_slots = 12 %}

        {# Build 15-min slot data: price and solar for each quarter #}
        {% set ns = namespace(slots=[], best_start=-1, best_cost=9999) %}

        {# Today's remaining quarters #}
        {% for i in range(current_slot, prices_raw | length) %}
          {% set price = prices_raw[i] | float(0) %}
          {% set hour = (i * 15) // 60 %}
          {% set solar_kw = 0 %}
          {% for s in solar if s.period_start is defined and s.period_start.hour == hour %}
            {% set solar_kw = solar_kw + s.pv_estimate | float(0) %}
          {% endfor %}
          {% set solar_kw = solar_kw / 4 %}
          {% set net_cost = price - (solar_kw * price * 0.8) %}
          {% set ns.slots = ns.slots + [{'slot': i, 'day': 'idag', 'price': price, 'net': net_cost | round(3)}] %}
        {% endfor %}

        {# Tomorrow's quarters - only if price data available #}
        {% if prices_tomorrow | length > 0 %}
          {% for i in range(0, prices_tomorrow | length) %}
            {% set price = prices_tomorrow[i] | float(0) %}
            {% set hour = (i * 15) // 60 %}
            {% set solar_kw = 0 %}
            {% for s in solar_tomorrow if s.period_start is defined and s.period_start.hour == hour %}
              {% set solar_kw = solar_kw + s.pv_estimate | float(0) %}
            {% endfor %}
            {% set solar_kw = solar_kw / 4 %}
            {% set net_cost = price - (solar_kw * price * 0.8) %}
            {% set ns.slots = ns.slots + [{'slot': i, 'day': 'imorgon', 'price': price, 'net': net_cost | round(3)}] %}
          {% endfor %}
        {% endif %}

        {# Find best 3-hour window (12 x 15-min slots) #}
        {% for i in range(0, ns.slots | length - window_slots + 1) %}
          {% set wns = namespace(cost=0) %}
          {% for j in range(window_slots) %}
            {% set wns.cost = wns.cost + ns.slots[i + j].net %}
          {% endfor %}
          {% if wns.cost < ns.best_cost %}
            {% set ns.best_cost = wns.cost %}
            {% set ns.best_start = i %}
          {% endif %}
        {% endfor %}

        {% if ns.best_start >= 0 %}
          {% set best = ns.slots[ns.best_start] %}
          {% set minutes = best.slot * 15 %}
          {{ best.day | capitalize }} {{ '%02d:%02d' | format(minutes // 60, minutes % 60) }}
        {% else %}
          Ej tillgängligt
        {% endif %}
      attributes:
        best_start_slot: >
          {% set prices_raw = state_attr('sensor.nordpool_kwh_se3_sek_3_10_025', 'today') or [] %}
          {% set prices_tomorrow = state_attr('sensor.nordpool_kwh_se3_sek_3_10_025', 'tomorrow') or [] %}
          {% set solar = state_attr('sensor.solcast_pv_forecast_forecast_today', 'detailedForecast') or [] %}
          {% set solar_tomorrow = state_attr('sensor.solcast_pv_forecast_forecast_tomorrow', 'detailedForecast') or [] %}
          {% set current_slot = now().hour * 4 + (now().minute // 15) %}
          {% set window_slots = 12 %}
          {% set ns = namespace(slots=[], best_start=-1, best_cost=9999) %}
          {% for i in range(current_slot, prices_raw | length) %}
            {% set price = prices_raw[i] | float(0) %}
            {% set hour = (i * 15) // 60 %}
            {% set solar_kw = 0 %}
            {% for s in solar if s.period_start is defined and s.period_start.hour == hour %}{% set solar_kw = solar_kw + s.pv_estimate | float(0) %}{% endfor %}
            {% set net_cost = price - (solar_kw / 4 * price * 0.8) %}
            {% set ns.slots = ns.slots + [{'slot': i, 'day': 'idag', 'net': net_cost}] %}
          {% endfor %}
          {% if prices_tomorrow | length > 0 %}
            {% for i in range(0, prices_tomorrow | length) %}
              {% set price = prices_tomorrow[i] | float(0) %}
              {% set hour = (i * 15) // 60 %}
              {% set solar_kw = 0 %}
              {% for s in solar_tomorrow if s.period_start is defined and s.period_start.hour == hour %}{% set solar_kw = solar_kw + s.pv_estimate | float(0) %}{% endfor %}
              {% set net_cost = price - (solar_kw / 4 * price * 0.8) %}
              {% set ns.slots = ns.slots + [{'slot': i, 'day': 'imorgon', 'net': net_cost}] %}
            {% endfor %}
          {% endif %}
          {% for i in range(0, ns.slots | length - window_slots + 1) %}
            {% set wns = namespace(cost=0) %}
            {% for j in range(window_slots) %}{% set wns.cost = wns.cost + ns.slots[i + j].net %}{% endfor %}
            {% if wns.cost < ns.best_cost %}{% set ns.best_cost = wns.cost %}{% set ns.best_start = i %}{% endif %}
          {% endfor %}
          {% if ns.best_start >= 0 %}
            {% set best = ns.slots[ns.best_start] %}
            {% set minutes = best.slot * 15 %}
            {{ '%02d:%02d' | format(minutes // 60, minutes % 60) }}
          {% else %}-1{% endif %}
        best_window_cost: >
          {% set prices_raw = state_attr('sensor.nordpool_kwh_se3_sek_3_10_025', 'today') or [] %}
          {% set prices_tomorrow = state_attr('sensor.nordpool_kwh_se3_sek_3_10_025', 'tomorrow') or [] %}
          {% set solar = state_attr('sensor.solcast_pv_forecast_forecast_today', 'detailedForecast') or [] %}
          {% set solar_tomorrow = state_attr('sensor.solcast_pv_forecast_forecast_tomorrow', 'detailedForecast') or [] %}
          {% set current_slot = now().hour * 4 + (now().minute // 15) %}
          {% set window_slots = 12 %}
          {% set ns = namespace(slots=[], best_cost=9999) %}
          {% for i in range(current_slot, prices_raw | length) %}
            {% set price = prices_raw[i] | float(0) %}
            {% set hour = (i * 15) // 60 %}
            {% set solar_kw = 0 %}
            {% for s in solar if s.period_start is defined and s.period_start.hour == hour %}{% set solar_kw = solar_kw + s.pv_estimate | float(0) %}{% endfor %}
            {% set net_cost = price - (solar_kw / 4 * price * 0.8) %}
            {% set ns.slots = ns.slots + [net_cost] %}
          {% endfor %}
          {% if prices_tomorrow | length > 0 %}
            {% for i in range(0, prices_tomorrow | length) %}
              {% set price = prices_tomorrow[i] | float(0) %}
              {% set hour = (i * 15) // 60 %}
              {% set solar_kw = 0 %}
              {% for s in solar_tomorrow if s.period_start is defined and s.period_start.hour == hour %}{% set solar_kw = solar_kw + s.pv_estimate | float(0) %}{% endfor %}
              {% set net_cost = price - (solar_kw / 4 * price * 0.8) %}
              {% set ns.slots = ns.slots + [net_cost] %}
            {% endfor %}
          {% endif %}
          {% for i in range(0, ns.slots | length - window_slots + 1) %}
            {% set wns = namespace(cost=0) %}
            {% for j in range(window_slots) %}{% set wns.cost = wns.cost + ns.slots[i + j] %}{% endfor %}
            {% if wns.cost < ns.best_cost %}{% set ns.best_cost = wns.cost %}{% endif %}
          {% endfor %}
          {{ (ns.best_cost / 4) | round(2) }}
        is_today: >
          {{ 'idag' in states('sensor.smart_tid_data') | lower }}

    # Current status sensor - is now a good time to run appliances?
    # Uses quarter-hourly price (updates every 15 min)
    - name: "Elkostnad Status"
      unique_id: elkostnad_status
      icon: mdi:information
      state: >
        {% set price = states('sensor.nordpool_kwh_se3_sek_3_10_025') | float(0) %}
        {% set avg = state_attr('sensor.nordpool_kwh_se3_sek_3_10_025', 'average') | float(1) %}
        {% set solar = states('sensor.solarnet_effekt_solceller') | float(0) %}
        {% set power = states('sensor.smart_meter_ts_65a_3_aktiv_effekt') | float(0) %}
        {% set peak_avg = states('sensor.peak_power_top_5_average') | float(0) %}

        {% set price_score = (price / avg) if avg > 0 else 1 %}
        {% set solar_bonus = 1 if solar > 500 else (0.5 if solar > 100 else 0) %}
        {% set peak_risk = 1 if (power / 1000) > (peak_avg * 0.9) else 0 %}

        {% set total_score = price_score - solar_bonus + peak_risk %}

        {% if total_score < 0.7 %}Perfekt
        {% elif total_score < 1.0 %}Bra
        {% elif total_score < 1.3 %}OK
        {% else %}Vänta{% endif %}
      attributes:
        price_vs_avg: "{{ ((states('sensor.nordpool_kwh_se3_sek_3_10_025') | float(0)) / (state_attr('sensor.nordpool_kwh_se3_sek_3_10_025', 'average') | float(1)) * 100) | round(0) }}%"
        solar_production: "{{ states('sensor.solarnet_effekt_solceller') | float(0) | round(0) }} W"
        current_power: "{{ states('sensor.smart_meter_ts_65a_3_aktiv_effekt') | float(0) | round(0) }} W"
        peak_average: "{{ states('sensor.peak_power_top_5_average') | float(0) | round(2) }} kW"
        recommendation: >
          {% set price = states('sensor.nordpool_kwh_se3_sek_3_10_025') | float(0) %}
          {% set avg = state_attr('sensor.nordpool_kwh_se3_sek_3_10_025', 'average') | float(1) %}
          {% set solar = states('sensor.solarnet_effekt_solceller') | float(0) %}
          {% set power = states('sensor.smart_meter_ts_65a_3_aktiv_effekt') | float(0) %}
          {% set peak_avg = states('sensor.peak_power_top_5_average') | float(0) %}
          {% set price_score = (price / avg) if avg > 0 else 1 %}
          {% set solar_bonus = 1 if solar > 500 else (0.5 if solar > 100 else 0) %}
          {% set peak_risk = 1 if (power / 1000) > (peak_avg * 0.9) else 0 %}
          {% set total_score = price_score - solar_bonus + peak_risk %}
          {% if total_score < 0.7 %}Kör tunga förbrukare nu!
          {% elif total_score < 1.0 %}Bra tid att köra disk/tvätt
          {% elif total_score < 1.3 %}Normalt läge
          {% else %}Skjut upp om möjligt{% endif %}

