esphome:
  name: sht30-kallare
  friendly_name: SHT30 Källare
  on_boot:
    priority: 600
    then:
      - delay: 2s

esp8266:
  board: d1_mini

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

api:
  encryption:
    key: !secret api_encryption_key

logger:
  level: INFO

ota:
  platform: esphome
  password: !secret ota_password

# Wiring SHT30 to D1 Mini:
# -------------------------
# Röd/Brun (VCC)   → 3.3V
# Svart (GND)      → GND
# Gul/Vit (SCL)    → D1 (GPIO5)
# Grön/Blå (SDA)   → D2 (GPIO4)

i2c:
  sda: D2
  scl: D1
  scan: true
  frequency: 10kHz

sensor:
  - platform: sht3xd
    temperature:
      name: "Temperatur"
    humidity:
      name: "Luftfuktighet"
    address: 0x44
    update_interval: 60s

  - platform: uptime
    name: "Uptime"
  - platform: wifi_signal
    name: "WiFi Signal"
    update_interval: 60s

binary_sensor:
  - platform: status
    name: "Status"
