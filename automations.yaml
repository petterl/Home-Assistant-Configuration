- id: gordon_gps_tracker
  alias: Gordon - uppdatera GPS-tracker
  description: Uppdaterar device_tracker.gordon (kartmarkör) OCH sparar senast kända
    position i persistenta helpers. Gordon syns alltid på kartan — klipper, dockad,
    fastnat. Status-filter borttaget; håll bara koll på giltiga koordinater + jitter.
  triggers:
  - trigger: state
    entity_id: sensor.gordon_latitude
    id: moved
  - trigger: state
    entity_id: sensor.gordon_longitude
    id: moved
  # Keepalive: håller markören färsk även när han står still (t.ex. fastnat ute).
  - trigger: time_pattern
    minutes: /15
    id: keepalive
  conditions:
  # Giltiga, tillgängliga koordinater (skydd mot unavailable/unknown/Null Island).
  # I dockan rapporterar Robonect ofta ingen GPS-fix → då hoppar vi över och
  # markören behåller senast kända position (inget dockan-brus byggs upp).
  - condition: template
    value_template: >
      {{ states('sensor.gordon_latitude') not in ['unavailable','unknown','none']
         and states('sensor.gordon_longitude') not in ['unavailable','unknown','none']
         and states('sensor.gordon_latitude') | float(0) | abs > 1
         and states('sensor.gordon_longitude') | float(0) | abs > 1 }}
  # Publicera vid keepalive, ELLER vid rörelse > 3 m sedan senast loggade
  # (sållar GPS-jitter under klippning). distance() ger km → *1000 till meter.
  - condition: template
    value_template: >
      {% if trigger.id == 'keepalive' %}
        true
      {% else %}
        {% set pla = state_attr('device_tracker.gordon', 'latitude') %}
        {% set plo = state_attr('device_tracker.gordon', 'longitude') %}
        {{ pla is none or plo is none
           or distance(states('sensor.gordon_latitude') | float,
                       states('sensor.gordon_longitude') | float,
                       pla, plo) | float(0) * 1000 > 3 }}
      {% endif %}
  actions:
  # Spara senast kända position i persistenta helpers (överlever omstart/GPS-bortfall)
  - action: input_number.set_value
    target:
      entity_id: input_number.gordon_last_lat
    data:
      value: "{{ states('sensor.gordon_latitude') | float }}"
  - action: input_number.set_value
    target:
      entity_id: input_number.gordon_last_lon
    data:
      value: "{{ states('sensor.gordon_longitude') | float }}"
  # Uppdatera kartmarkören
  - action: device_tracker.see
    data:
      dev_id: gordon
      source_type: gps
      gps:
      - "{{ states('sensor.gordon_latitude') | float }}"
      - "{{ states('sensor.gordon_longitude') | float }}"
      gps_accuracy: 5
      battery: "{{ states('sensor.automower_battery_0') | int(0) }}"
      attributes:
        satellites: "{{ states('sensor.gordon_gps') | int(0) }}"
        icon: mdi:robot-mower
  mode: queued
  max: 10
- id: gordon_gps_restore
  alias: Gordon - återställ kartposition vid omstart
  description: Seedar device_tracker.gordon från senast kända position (persistenta
    helpers) efter omstart, så markören finns direkt även om GPS är unavailable i dockan.
  triggers:
  - trigger: homeassistant
    event: start
  conditions:
  # Bara om vi har en rimlig sparad position (Sverige-box) att återställa från
  - condition: template
    value_template: >
      {% set la = states('input_number.gordon_last_lat') | float(0) %}
      {% set lo = states('input_number.gordon_last_lon') | float(0) %}
      {{ 50 < la < 70 and 5 < lo < 25 }}
  actions:
  - delay:
      seconds: 30
  - action: device_tracker.see
    data:
      dev_id: gordon
      source_type: gps
      gps:
      - "{{ states('input_number.gordon_last_lat') | float }}"
      - "{{ states('input_number.gordon_last_lon') | float }}"
      gps_accuracy: 10
      attributes:
        icon: mdi:robot-mower
  mode: single
- id: gordon_fel_notis
  alias: Gordon - Notis vid fel
  description: Notifierar när Gordon fastnat, hamnat utanför området eller annars
    behöver hjälp
  triggers:
  - trigger: state
    entity_id: sensor.automower_mower_status
    to: '7'
    for:
      seconds: 30
  - trigger: state
    entity_id: sensor.automower_mower_status
    to: '8'
    for:
      seconds: 30
  actions:
  - action: notify.mobile_app_petter_iphone
    data:
      title: Gordon behöver hjälp
      message: >
        {% set msg = states('sensor.automower_mower_error_message') %}
        {% set code = states('sensor.automower_mower_error_code') %}
        {% if msg not in ['unknown', 'unavailable', ''] %}{{ msg }}{% else %}Fel{% endif %}
        (kod {{ code }}). Batteri: {{ states('sensor.automower_mower_battery_charge') }}%.
      data:
        push:
          sound:
            name: default
            critical: 1
            volume: 1.0
        url: /lovelace-hem/gordon
  mode: single
- id: gordon_strandad_notis
  alias: Gordon - Notis vid urladdning utanför dockan
  description: >
    Larmar när Gordon drar batteri utan att klippa = står fast/parkerad ute
    (t.ex. efter "No traction"). Fångar det tysta läget som status-7-notisen
    missar och som annars slutar i "Battery empty" (vilket slog ut GPS:en
    2026-06-17). Laddström är negativ när mowern inte står i dockan.
    OBS: time_pattern (ej numeric_state) så även en urladdning som redan
    pågår vid omstart/reload fångas - numeric_state missar tillstånd som
    redan är sanna när automationen laddas.
  triggers:
  - trigger: time_pattern
    minutes: /30
  - trigger: numeric_state
    entity_id: sensor.automower_mower_battery_charge
    below: 25
  conditions:
  # Negativ laddström = mowern står INTE i dockan (dockan laddar → positiv ström)
  - condition: numeric_state
    entity_id: sensor.automower_battery_current
    below: -20
  # Inte mitt i normal drift (klipper=2, söker dock=3, laddar=4, söker=5)
  - condition: template
    value_template: >
      {{ states('sensor.automower_mower_status') not in
         ['2', '3', '4', '5', 'unknown', 'unavailable'] }}
  actions:
  # Första larmet i episoden = kritiskt (ljud). Resten = vanliga påminnelser.
  # Helpern nollställs av gordon_strand_reset när Gordon är tillbaka i drift/docka.
  - choose:
    - conditions:
      - condition: state
        entity_id: input_boolean.gordon_strand_larm_skickat
        state: 'off'
      sequence:
      - action: input_boolean.turn_on
        target:
          entity_id: input_boolean.gordon_strand_larm_skickat
      - action: notify.mobile_app_petter_iphone
        data:
          title: Gordon laddar ur ute
          message: >
            Gordon klipper inte men drar batteri - står troligen fast eller
            parkerad utanför dockan. Batteri: {{ states('sensor.automower_mower_battery_charge') }}%.
            Senaste fel: {{ states('sensor.automower_mower_error_message') }}
            (kod {{ states('sensor.automower_mower_error_code') }}).
          data:
            tag: gordon_strandad
            url: /lovelace-hem/gordon
            push:
              sound:
                name: default
                critical: 1
                volume: 1.0
    default:
    - action: notify.mobile_app_petter_iphone
      data:
        title: Gordon laddar ur ute (påminnelse)
        message: >
          Gordon står fortfarande fast ute. Batteri:
          {{ states('sensor.automower_mower_battery_charge') }}%.
        data:
          tag: gordon_strandad
          url: /lovelace-hem/gordon
  mode: single
- id: gordon_regn_stoppa
  alias: Gordon - Stoppa vid regn
  description: Sätter Gordon i MAN-läge när vädret slår om till regn. Om mowern är
    ute skickas den hem.
  triggers:
  - trigger: state
    entity_id: weather.forecast_hem
    to:
    - rainy
    - pouring
    - lightning-rainy
    - snowy-rainy
    - hail
  conditions:
  # Hoppa över om mowern redan är i MAN-läge (mode = 1) — undvik dubbeltryck
  - condition: not
    conditions:
    - condition: state
      entity_id: sensor.automower_mower_mode
      state: '1'
  actions:
  - action: button.press
    target:
      entity_id: button.automower_man
  # Om mowern inte är hemma (parkerad eller laddar), tryck hem
  - if:
    - condition: not
      conditions:
      - condition: state
        entity_id: sensor.automower_mower_status
        state:
        - '1'
        - '4'
    then:
    - delay:
        seconds: 3
    - action: button.press
      target:
        entity_id: button.automower_home
  - action: notify.mobile_app_petter_iphone
    data:
      title: Gordon stoppad – regn
      message: >
        Vädret slog om till {{ states('weather.forecast_hem') }}. Gordon satt
        i MAN-läge{% if states('sensor.automower_mower_status') not in ['1','4'] %}
        och skickas hem{% endif %}.
      data:
        url: /lovelace-hem/gordon
  mode: single
- id: gordon_regn_aterupp
  alias: Gordon - Återuppta efter regn
  description: Tar Gordon ur MAN-läge när vädret varit torrt i 1h.
  triggers:
  - trigger: state
    entity_id: weather.forecast_hem
    for:
      hours: 1
  conditions:
  # Mowern är i MAN-läge (1) eller Hemma-läge (2) — annars rör vi inget.
  # Stopp-automationen kan lämna den i läge 2 (HEM) efter regn, så båda måste fångas.
  - condition: state
    entity_id: sensor.automower_mower_mode
    state:
    - '1'
    - '2'
  # Det nuvarande vädertillståndet är inte regn
  - condition: not
    conditions:
    - condition: state
      entity_id: weather.forecast_hem
      state:
      - rainy
      - pouring
      - lightning-rainy
      - snowy-rainy
      - hail
  actions:
  - action: button.press
    target:
      entity_id: button.automower_auto
  - action: notify.mobile_app_petter_iphone
    data:
      title: Gordon i AUTO
      message: Vädret torrt sen 1h ({{ states('weather.forecast_hem') }}). Gordon
        i AUTO igen.
      data:
        url: /lovelace-hem/gordon
  mode: single
- id: gordon_raddad_notis
  alias: Gordon - Notis vid räddning (starta?)
  description: >
    När Gordon går FRÅN fel/fastnat (status 7/8) till ett stilla läge (inte
    normal drift) = någon har räddat honom. Skickar en actionable notis med en
    "Starta klippning"-knapp så han inte blir stående parkerad (hände 2026-06-23:
    rescue i Auto utanför timer-fönstret → tyst parkering).
  triggers:
  - trigger: state
    entity_id: sensor.automower_mower_status
    from: '7'
    for:
      seconds: 10
  - trigger: state
    entity_id: sensor.automower_mower_status
    from: '8'
    for:
      seconds: 10
  conditions:
  # Inte redan i normal drift (klipper=2, söker dock=3, laddar=4, söker=5) —
  # bara skicka när han faktiskt blivit stående efter räddningen.
  - condition: template
    value_template: >
      {{ states('sensor.automower_mower_status') not in
         ['2', '3', '4', '5', 'unknown', 'unavailable'] }}
  actions:
  - action: notify.mobile_app_petter_iphone
    data:
      title: Gordon räddad
      message: >
        Gordon är ur fel-läget och står parkerad. Vill du starta klippningen igen?
        Batteri: {{ states('sensor.automower_mower_battery_charge') }}%.
      data:
        tag: gordon_raddad
        url: /lovelace-hem/gordon
        actions:
        - action: GORDON_START_MOW
          title: Starta klippning
  mode: single
- id: gordon_start_fran_notis
  alias: Gordon - Starta klippning från notis
  description: >
    Trycker start när du valt "Starta klippning" i räddnings-notisen. Verifierar
    att han faktiskt börjar klippa (status 2); annars ett omförsök, sedan en
    kritisk notis. Tvingar aldrig MAN-läge (per beslut 2026-06-23).
  triggers:
  - trigger: event
    event_type: mobile_app_notification_action
    event_data:
      action: GORDON_START_MOW
  actions:
  - action: button.press
    target:
      entity_id: button.automower_start
  - wait_template: "{{ states('sensor.automower_mower_status') == '2' }}"
    timeout:
      seconds: 45
    continue_on_timeout: true
  # Omförsök om han inte klipper än (t.ex. tyst parkering i Auto)
  - if:
    - condition: template
      value_template: "{{ states('sensor.automower_mower_status') != '2' }}"
    then:
    - action: button.press
      target:
        entity_id: button.automower_start
    - wait_template: "{{ states('sensor.automower_mower_status') == '2' }}"
      timeout:
        seconds: 45
      continue_on_timeout: true
  # Resultat: bekräfta eller larma
  - if:
    - condition: template
      value_template: "{{ states('sensor.automower_mower_status') == '2' }}"
    then:
    - action: notify.mobile_app_petter_iphone
      data:
        title: Gordon klipper igen 🌱
        message: Gordon är igång och klipper.
        data:
          tag: gordon_raddad
          url: /lovelace-hem/gordon
    else:
    - action: notify.mobile_app_petter_iphone
      data:
        title: Fick inte igång Gordon
        message: >
          Två startförsök misslyckades — Gordon klipper inte (status
          {{ states('sensor.automower_mower_status') }}). Kolla honom.
        data:
          tag: gordon_raddad
          url: /lovelace-hem/gordon
          push:
            sound:
              name: default
              critical: 1
              volume: 1.0
  mode: single
- id: gordon_stoppad_ute_notis
  alias: Gordon - Notis när stoppad ute
  description: >
    Snabb strandnings-detektor: larmar inom 1 min när Gordon stannar UTANFÖR
    dockan (stopped=on + negativ laddström = ej i docka). Fångar fallet som
    gordon_strandad_notis missar i tid (den kollar bara var 30:e min / under
    25%). Status 17/1 ensamt räcker inte — kombinera med stopped + ström,
    eftersom status 17 även är trygg nattvila i dockan. Skickar "Skicka hem"
    som best-effort (hjälper om han bara pausat, ej vid "Outside working area").
  triggers:
  - trigger: state
    entity_id: binary_sensor.automower_mower_stopped
    to: 'on'
    for:
      minutes: 1
  conditions:
  # Negativ laddström = står INTE i dockan (docka → positiv ström)
  - condition: numeric_state
    entity_id: sensor.automower_battery_current
    below: -20
  # Inte mitt i normal drift (klipper=2, söker dock=3, laddar=4, söker=5)
  - condition: template
    value_template: >
      {{ states('sensor.automower_mower_status') not in
         ['2', '3', '4', '5', 'unknown', 'unavailable'] }}
  actions:
  # Första larmet i episoden = kritiskt (ljud). Resten = vanliga påminnelser.
  - choose:
    - conditions:
      - condition: state
        entity_id: input_boolean.gordon_strand_larm_skickat
        state: 'off'
      sequence:
      - action: input_boolean.turn_on
        target:
          entity_id: input_boolean.gordon_strand_larm_skickat
      - action: notify.mobile_app_petter_iphone
        data:
          title: Gordon stoppad ute
          message: >
            Gordon har stannat utanför dockan och klipper inte - står troligen
            fast. Batteri: {{ states('sensor.automower_mower_battery_charge') }}%.
            Senaste fel: {{ states('sensor.automower_mower_error_message') }}
            (kod {{ states('sensor.automower_mower_error_code') }}).
          data:
            tag: gordon_stoppad_ute
            url: /lovelace-hem/gordon
            push:
              sound:
                name: default
                critical: 1
                volume: 1.0
            actions:
            - action: GORDON_SKICKA_HEM
              title: Skicka hem
    default:
    - action: notify.mobile_app_petter_iphone
      data:
        title: Gordon stoppad ute (påminnelse)
        message: >
          Gordon står fortfarande stoppad ute. Batteri:
          {{ states('sensor.automower_mower_battery_charge') }}%.
        data:
          tag: gordon_stoppad_ute
          url: /lovelace-hem/gordon
          actions:
          - action: GORDON_SKICKA_HEM
            title: Skicka hem
  mode: single
- id: gordon_skicka_hem_fran_notis
  alias: Gordon - Skicka hem från notis
  description: Trycker hem-knappen när du valt "Skicka hem" i strandnings-notisen.
  triggers:
  - trigger: event
    event_type: mobile_app_notification_action
    event_data:
      action: GORDON_SKICKA_HEM
  actions:
  - action: button.press
    target:
      entity_id: button.automower_home
  - action: notify.mobile_app_petter_iphone
    data:
      title: Gordon - skickad hem
      message: Hem-kommando skickat. Fungerar bara om han kan köra själv (ej vid
        "Outside working area" - då behöver han hämtas).
      data:
        tag: gordon_stoppad_ute
        url: /lovelace-hem/gordon
  mode: single
- id: gordon_strand_reset
  alias: Gordon - Nollställ strandlarm
  description: >
    Nollställer input_boolean.gordon_strand_larm_skickat när Gordon är tillbaka
    i normal drift eller docka, så nästa strandnings-episod åter börjar med ett
    kritiskt larm. Triggar på normal status (klipper/söker dock/laddar/söker),
    att stopped slår av, eller positiv laddström (= står i dockan).
  triggers:
  - trigger: state
    entity_id: sensor.automower_mower_status
    to:
    - '2'
    - '3'
    - '4'
    - '5'
  - trigger: state
    entity_id: binary_sensor.automower_mower_stopped
    to: 'off'
  - trigger: numeric_state
    entity_id: sensor.automower_battery_current
    above: 0
  conditions:
  - condition: state
    entity_id: input_boolean.gordon_strand_larm_skickat
    state: 'on'
  actions:
  - action: input_boolean.turn_off
    target:
      entity_id: input_boolean.gordon_strand_larm_skickat
  mode: single
- id: birdhouse_motion_clip
  alias: Fågelholk - Spela in klipp vid rörelse
  description: >
    Skapar ett Frigate-klipp per rörelsehändelse i holken (motion-triggat,
    MotionEye-stil). Öppnar ett manuellt event när rörelse börjar och avslutar
    det när rörelsen upphört i 5s; klippet hamnar i Media → Frigate → birdhouse
    (lagras på NAS, auto-rensas efter 2 dagar). Objektdetektering (person) är
    avstängd, så detta är enda källan till diskreta holk-klipp. Timeout 15 min
    skyddar mot kvarglömt öppet event om rörelsen aldrig rapporteras som av.
  triggers:
  - trigger: state
    entity_id: binary_sensor.birdhouse_motion
    to: 'on'
  actions:
  - action: rest_command.birdhouse_clip_start
    response_variable: start
  - variables:
      eid: >
        {{ start.content.event_id if start is defined and start.content is defined
           and start.content.event_id is defined else '' }}
  - wait_for_trigger:
    - trigger: state
      entity_id: binary_sensor.birdhouse_motion
      to: 'off'
      for:
        seconds: 5
    timeout:
      minutes: 15
    continue_on_timeout: true
  - if:
    - condition: template
      value_template: "{{ eid | length > 0 }}"
    then:
    - action: rest_command.birdhouse_clip_end
      data:
        event_id: "{{ eid }}"
  mode: single
- id: birdhouse_klassificering_notis
  alias: Fågelholk - Notis vid statusbyte
  description: >
    Notifierar vid VARJE statusbyte i Frigate-klassificeringen av holken
    (tomt/ungar_i_boet/...), med bild - för att följa modellen under träning.
    for:5s dämpar flimmer: en notis per stabilt byte, inte vid varje ryck.
  triggers:
  - trigger: state
    entity_id: sensor.birdhouse_holk_classification
    for:
      seconds: 5
  conditions:
  - condition: template
    value_template: >
      {{ trigger.to_state.state not in ['unknown', 'unavailable', 'none', '']
         and trigger.from_state.state != trigger.to_state.state }}
  actions:
  - action: notify.mobile_app_petter_iphone
    data:
      title: 🐦 Fågelholken
      message: >-
        Holken: {{ trigger.to_state.state | replace('_', ' ') | capitalize }}
        (var: {{ trigger.from_state.state | replace('_', ' ') | capitalize }})
      data:
        image: /api/camera_proxy/camera.birdhouse
        url: /lovelace-holk
  mode: single
