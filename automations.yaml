      payload: '{"child_lock": "LOCK"}'
  - service: mqtt.publish
    data:
      topic: zigbee2mqtt/Network/set
      payload: '{"child_lock": "LOCK"}'
  mode: single
- id: dorrklocka_spela_ljud
  alias: Dörrklocka - Spela ljud i alla högtalare
  description: Spelar dörrklocksljud via Music Assistant när någon ringer på dörren
  triggers:
  - entity_id: event.ringklocka_dorrklocka
    trigger: state
