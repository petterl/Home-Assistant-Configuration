- id: git_pull_on_webhook
  alias: Git - Pull vid GitHub push
  description: Hämtar config från GitHub när webhook triggas, varnar om lokala ändringar
    finns
  trigger:
  - platform: webhook
    webhook_id: 60f082f2d2ff6fcb26bd51d7a79e3d22fb233ebbbf18b29d2ce7ce0cc2e588cc
    allowed_methods:
    - POST
    local_only: false
  action:
  - service: shell_command.git_has_local_changes
    response_variable: local_status
  - variables:
      has_local_changes: '{{ local_status.stdout | default('''') | length > 0 }}'
  - if:
    - condition: template
      value_template: '{{ has_local_changes }}'
    then:
    - service: persistent_notification.create
      data:
        title: 'Git: Lokala ändringar upptäckta!'
        message: 'Det finns lokala ändringar som inte pushats: {{ local_status.stdout
          }}

          Använd knappen "Git Push" för att pusha ändringarna innan pull.

          '
        notification_id: git_local_changes_warning
  - service: shell_command.git_pull
    response_variable: pull_result
  - if:
    - condition: template
      value_template: '{{ pull_result.returncode != 0 }}'
    then:
    - service: persistent_notification.create
      data:
        title: Git Pull MISSLYCKADES
        message: 'Git pull misslyckades: {{ now().strftime(''%Y-%m-%d %H:%M'') }}

          Felkod: {{ pull_result.returncode }} {{ pull_result.stderr | default(pull_result.stdout)
          | default(''Okänt fel'') }}

          '
        notification_id: git_pull_error
    - stop: Git pull failed
  - delay:
      seconds: 2
  - service: shell_command.git_diff_files
    response_variable: git_diff
  - variables:
      changed_files: '{{ git_diff.stdout | default('''') }}'
      z2m_changed: '{{ ''zigbee2mqtt/'' in changed_files }}'
      automations_changed: '{{ ''automations.yaml'' in changed_files }}'
      scripts_changed: '{{ ''scripts.yaml'' in changed_files }}'
      scenes_changed: '{{ ''scenes.yaml'' in changed_files }}'
  - if:
    - condition: template
      value_template: '{{ automations_changed }}'
    then:
    - service: automation.reload
  - if:
    - condition: template
      value_template: '{{ scripts_changed }}'
    then:
    - service: script.reload
  - if:
    - condition: template
      value_template: '{{ scenes_changed }}'
    then:
    - service: scene.reload
  - if:
    - condition: template
      value_template: '{{ z2m_changed }}'
    then:
    - service: hassio.addon_restart
      data:
        addon: 45df7312_zigbee2mqtt
  - service: persistent_notification.create
    data:
      title: Git Pull
      message: 'Config uppdaterad: {{ now().strftime(''%Y-%m-%d %H:%M'') }} {% if
        automations_changed %}✓ Automations{% endif %} {% if scripts_changed %}✓ Scripts{%
        endif %} {% if scenes_changed %}✓ Scenes{% endif %} {% if z2m_changed %}✓
        Zigbee2MQTT{% endif %} {% if not (automations_changed or scripts_changed or
        scenes_changed or z2m_changed) %}(inga reloads behövdes){% endif %}

        '
      notification_id: git_pull_status
  mode: single
- id: git_pull_on_startup
  alias: Git - Pull vid uppstart
  description: Hämtar senaste config från GitHub när HA startar
  trigger:
  - platform: homeassistant
    event: start
  action:
  - delay:
      seconds: 30
  - service: shell_command.git_pull
    response_variable: pull_result
  - if:
    - condition: template
      value_template: '{{ pull_result.returncode != 0 }}'
    then:
    - service: persistent_notification.create
      data:
        title: Uppstart Git Pull MISSLYCKADES
        message: 'Git pull vid uppstart misslyckades: {{ now().strftime(''%Y-%m-%d
          %H:%M'') }}

          Felkod: {{ pull_result.returncode }} {{ pull_result.stderr | default(pull_result.stdout)
          | default(''Okänt fel'') }}

          '
        notification_id: git_pull_startup_error
    else:
    - service: persistent_notification.create
      data:
        title: Uppstart Git Pull
        message: 'Config synkad från GitHub vid uppstart: {{ now().strftime(''%Y-%m-%d
          %H:%M'') }}'
        notification_id: git_pull_startup
  mode: single
- id: git_pull_scheduled
  alias: Git - Schemalagd pull
  description: 'Backup: hämtar config från GitHub var 6:e timme'
  trigger:
  - platform: time_pattern
    hours: /6
  action:
  - service: shell_command.git_pull
    response_variable: pull_result
  - if:
    - condition: template
      value_template: '{{ pull_result.returncode != 0 }}'
    then:
    - service: persistent_notification.create
      data:
        title: Schemalagd Git Pull MISSLYCKADES
        message: 'Git pull misslyckades: {{ now().strftime(''%Y-%m-%d %H:%M'') }}

          Felkod: {{ pull_result.returncode }} {{ pull_result.stderr | default(pull_result.stdout)
          | default(''Okänt fel'') }}

          '
        notification_id: git_pull_scheduled_error
  mode: single
