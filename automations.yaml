- id: solceller_stoppa_export_lagt_pris
  alias: Solceller - Stoppa export vid lågt pris
  description: Begränsar solcellsexport till 0% när elpriset understiger prisgränsen
  trigger:
  - platform: state
    entity_id: binary_sensor.export_pris_for_lagt
    to: 'on'
  - platform: state
    entity_id: input_boolean.export_begransning_aktiv
    to: 'on'
  condition:
  - condition: state
    entity_id: input_boolean.export_begransning_aktiv
    state: 'on'
  - condition: state
    entity_id: input_boolean.solceller_export_begransad
    state: 'off'
  - condition: state
    entity_id: binary_sensor.export_pris_for_lagt
    state: 'on'
  action:
  - service: input_boolean.turn_on
    target:
      entity_id: input_boolean.solceller_export_begransad
  - service: modbus.write_register
    data:
      hub: fronius
      address: 40236
      unit: 1
      value: 0
  - service: modbus.write_register
    data:
      hub: fronius
      address: 40246
      unit: 1
      value: 1
  - service: notify.mobile_app_petter_iphone
    data:
      title: Solceller begränsade
      message: 'Elpris {{ states(''sensor.nordpool_kwh_se3_sek_3_10_025'') }} SEK/kWh
        (gräns: {{ states(''input_number.export_begransning_pris'') }} SEK/kWh)

        '
  mode: single
- id: solceller_aterstall_export
  alias: Solceller - Återställ export
  description: Återställer normal export när priset är över gränsen eller funktionen
    stängs av
  trigger:
  - platform: state
    entity_id: binary_sensor.export_pris_for_lagt
    to: 'off'
  - platform: state
    entity_id: input_boolean.export_begransning_aktiv
    to: 'off'
  condition:
  - condition: state
    entity_id: input_boolean.solceller_export_begransad
    state: 'on'
  - condition: or
    conditions:
    - condition: state
      entity_id: input_boolean.export_begransning_aktiv
      state: 'off'
    - condition: state
      entity_id: binary_sensor.export_pris_for_lagt
      state: 'off'
  action:
  - service: input_boolean.turn_off
    target:
      entity_id: input_boolean.solceller_export_begransad
  - service: modbus.write_register
    data:
      hub: fronius
      address: 40246
      unit: 1
      value: 0
  - service: notify.mobile_app_petter_iphone
    data:
      title: Solceller återställda
      message: 'Elpris {{ states(''sensor.nordpool_kwh_se3_sek_3_10_025'') }} SEK/kWh
        - normal produktion

        '
  mode: single
- id: solceller_startup_sync
  alias: Solceller - Synka vid uppstart
  description: Säkerställer att Modbus-register matchar input_boolean vid HA-start
  trigger:
  - platform: homeassistant
    event: start
  condition:
  - condition: state
    entity_id: input_boolean.export_begransning_aktiv
    state: 'on'
  action:
  - delay:
      seconds: 60
  - if:
    - condition: state
      entity_id: input_boolean.solceller_export_begransad
      state: 'on'
    then:
    - service: modbus.write_register
      data:
        hub: fronius
        address: 40236
        unit: 1
        value: 0
    - service: modbus.write_register
      data:
        hub: fronius
        address: 40246
        unit: 1
        value: 1
    else:
    - service: modbus.write_register
      data:
        hub: fronius
        address: 40246
        unit: 1
        value: 0
  mode: single
- id: vatten_lackage_natt
  alias: Vatten - Läckagevarning natt
  description: Varnar om vatten rinner kontinuerligt under natten (01-05) i mer än
    30 minuter
  trigger:
  - platform: state
    entity_id: binary_sensor.vatten_rinner
    to: 'on'
    for:
      minutes: 30
  condition:
  - condition: time
    after: 01:00:00
    before: 05:00:00
  action:
  - service: notify.mobile_app_petter_iphone
    data:
      title: Vattenläckage?
      message: 'Vatten har runnit i över 30 minuter ({{ states(''sensor.water_meter_t_display_current_water_flow'')
        }} L/h). Kontrollera toaletter, kranar och varmvattenberedare!

        '
      data:
        push:
          sound:
            name: default
            critical: 1
            volume: 1.0
        tag: vatten_lackage
  - service: persistent_notification.create
    data:
      title: Vattenläckage?
      message: 'Vatten har runnit kontinuerligt sedan {{ (now() - timedelta(minutes=30)).strftime(''%H:%M'')
        }}. Flöde: {{ states(''sensor.water_meter_t_display_current_water_flow'')
        }} L/h Daglig förbrukning: {{ states(''sensor.vattenforbrukning_dag'') }}
        L

        '
      notification_id: vatten_lackage
  mode: single
- id: vatten_lackage_dag
  alias: Vatten - Läckagevarning dag
  description: Varnar om vatten rinner kontinuerligt under dagen (05-01) i mer än
    60 minuter
  triggers:
  - entity_id:
    - binary_sensor.vatten_rinner
    to:
    - 'on'
    for:
      hours: 1
      minutes: 0
      seconds: 0
    trigger: state
  conditions:
  - condition: time
    after: "05:00:00"
    before: "01:00:00"
  actions:
  - data:
      title: Möjligt vattenläckage
      message: 'Vatten har runnit i över 60 minuter ({{ states(''sensor.water_meter_t_display_current_water_flow'')
        }} L/h). Kontrollera kranar, toaletter och varmvattenberedare.

        '
      data:
        tag: vatten_lackage_dag
    action: notify.mobile_app_petter_iphone
  - data:
      title: Möjligt vattenläckage
      message: 'Vatten har runnit kontinuerligt sedan {{ (now() - timedelta(minutes=60)).strftime(''%H:%M'')
        }}. Flöde: {{ states(''sensor.water_meter_t_display_current_water_flow'')
        }} L/h Daglig förbrukning: {{ states(''sensor.vattenforbrukning_dag'') }}
        L

        '
      notification_id: vatten_lackage_dag
    action: persistent_notification.create
  mode: single
- id: smartplug_child_lock_startup
  alias: Smartplugs - Lås fysisk knapp vid uppstart
  description: Sätter child_lock på smartplugs som endast används för mätning
  trigger:
